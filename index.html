<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaChat</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0e;--s1:#0e1117;--s2:#141820;--s3:#1c2230;
  --br:#ff4500;
  --acc:#ff8c00;--acc-dim:#2a1800;
  --red:#ff5577;--red-dim:#3d1520;
  --txt:#e8edf5;--txt2:#7a8599;--txt3:#3a4255;
  --glow:0 0 18px rgba(255,140,0,.28);
  --nglow:0 0 8px rgba(255,80,0,.75),0 0 22px rgba(255,80,0,.35);
}
*{scrollbar-width:thin;scrollbar-color:var(--br) transparent}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center}
.logo{font-family:'IBM Plex Mono',monospace;font-size:50px;font-weight:700;letter-spacing:-2px;margin-bottom:6px}
.logo b{color:var(--acc);text-shadow:var(--glow)}
.sub{font-size:10px;letter-spacing:4px;color:var(--txt3);text-transform:uppercase;margin-bottom:36px}
.card{background:var(--s1);border:1px solid var(--br);box-shadow:var(--nglow);border-radius:14px;padding:28px 32px;text-align:center;width:272px}
.lbl{font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-bottom:10px;font-family:'IBM Plex Mono',monospace}
#splashCode{font-family:'IBM Plex Mono',monospace;font-size:46px;font-weight:700;color:var(--acc);letter-spacing:8px;text-shadow:0 0 24px rgba(255,140,0,.6);margin-bottom:6px}
.hint{font-size:11px;color:var(--txt3);margin-bottom:22px}
#enterBtn{width:100%;padding:11px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .2s}
#enterBtn:not(:disabled):hover{box-shadow:var(--glow);transform:translateY(-1px)}
#enterBtn:disabled{opacity:.45;cursor:not-allowed}

/* ── NO LIB ── */
#nolib{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:20px}
#nolib .t{color:var(--red);font-size:14px;font-weight:700;font-family:'IBM Plex Mono',monospace}
#nolib .b{color:var(--txt2);font-size:12px;max-width:310px;line-height:1.9}
#nolib a{color:var(--acc)}
#nolib button{padding:9px 22px;background:var(--s2);border:1px solid var(--br);border-radius:7px;color:var(--txt);font-weight:600;cursor:pointer;font-family:inherit}

/* ── STATUS BAR ── */
#bar{height:38px;background:var(--s1);border-bottom:1px solid var(--br);box-shadow:0 1px 0 var(--br),var(--nglow);display:flex;align-items:center;padding:0 14px;gap:9px;font-size:11px;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--txt3);flex-shrink:0;transition:all .3s}
.dot.on{background:var(--acc);box-shadow:0 0 8px var(--acc)}
.dot.err{background:var(--red)}
.dot.spin{animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}
#stxt{color:var(--txt2);flex:1}
.badge{background:var(--s3);border:1px solid var(--br);padding:3px 10px;border-radius:6px;cursor:pointer;transition:all .2s;user-select:none;font-size:11px;white-space:nowrap}
.badge:hover{border-color:var(--acc);color:var(--acc)}
#idbadge{color:var(--acc)}
#nickbadge{color:var(--txt2);max-width:120px;overflow:hidden;text-overflow:ellipsis}

/* ── LAYOUT ── */
.layout{flex:1;display:flex;overflow:hidden}
.sidebar{width:252px;background:var(--s1);border-right:1px solid var(--br);box-shadow:1px 0 0 var(--br),var(--nglow);display:flex;flex-direction:column;flex-shrink:0}
.sb-top{padding:10px 11px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px}
.sb-lbl{flex:1;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--txt3);font-family:'IBM Plex Mono',monospace}
.add-btn{width:24px;height:24px;border-radius:6px;background:var(--s2);border:1px solid var(--br);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0}
.add-btn:hover{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}
.clist{flex:1;overflow-y:auto;padding:5px}

/* ── CHAT ITEM ── */
.ci{padding:8px 9px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:8px;position:relative;margin-bottom:1px;transition:background .1s}
.ci:hover{background:var(--s2)}
.ci.active{background:var(--s3)}
.av{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px;flex-shrink:0}
.av.dm{background:#0e2038;color:#5ba3f5}
.av.grp{background:var(--acc-dim);color:var(--acc)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-prev{font-size:11px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.udot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 5px var(--acc);flex-shrink:0;visibility:hidden}
.ci.unread .udot{visibility:visible}
.delbtn{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:19px;height:19px;border-radius:50%;background:var(--red-dim);color:var(--red);display:none;align-items:center;justify-content:center;font-size:13px;border:1px solid rgba(255,85,119,.2);cursor:pointer;transition:all .2s}
.ci:hover .delbtn{display:flex}
.delbtn:hover{background:var(--red);color:#fff}

/* ── CHAT AREA ── */
.area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.nosel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txt3);gap:10px}
.nosel-ico{font-size:28px;opacity:.2}
.nosel-txt{font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:2px}

/* ── CHAT HEADER ── */
.chdr{height:50px;background:var(--s1);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.chdr-info{flex:1;min-width:0}
.chdr-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chdr-sub{font-size:11px;color:var(--txt3);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.ren-btn{background:var(--s3);border:1px solid var(--br);color:var(--txt3);cursor:pointer;border-radius:5px;padding:3px 8px;font-size:11px;font-family:'IBM Plex Sans',sans-serif;transition:all .2s;white-space:nowrap;flex-shrink:0}
.ren-btn:hover{border-color:var(--acc);color:var(--acc)}

/* ── MESSAGES ── */
.msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:1px}
.dsep{text-align:center;font-size:10px;color:var(--txt3);font-family:'IBM Plex Mono',monospace;letter-spacing:2px;padding:10px 0;display:flex;align-items:center;gap:10px}
.dsep::before,.dsep::after{content:'';flex:1;height:1px;background:var(--s3)}
.mrow{display:flex;align-items:flex-end;gap:5px;margin-bottom:1px}
.mrow.me{flex-direction:row-reverse}
.mbody{display:flex;flex-direction:column;max-width:68%}
.mrow.me .mbody{align-items:flex-end}
.msender{font-size:10px;color:var(--txt2);font-family:'IBM Plex Mono',monospace;margin-bottom:2px;padding:0 2px}
.bub{padding:8px 12px;border-radius:13px;font-size:13.5px;line-height:1.45;word-break:break-word;white-space:pre-wrap}
.bub.them{background:var(--s2);border-bottom-left-radius:3px}
.bub.me{background:var(--acc);color:#fff;border-bottom-right-radius:3px;font-weight:500;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.mrow.cont .bub.them{border-top-left-radius:3px}
.mrow.cont .bub.me{border-top-right-radius:3px}
.mtime{font-size:10px;color:var(--txt3);font-family:'IBM Plex Mono',monospace;white-space:nowrap;margin-bottom:2px;flex-shrink:0}
.mst{font-size:10px;align-self:flex-end;margin-bottom:3px;flex-shrink:0;font-family:'IBM Plex Mono',monospace}
.mst.ok{color:var(--acc)}.mst.wait{color:var(--txt3)}.mst.no{color:var(--red)}

/* ── INPUT BAR ── */
.ibar{padding:11px 14px;background:var(--s1);border-top:1px solid var(--br);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.iwrap{flex:1;background:var(--s2);border:1px solid var(--br);border-radius:9px;display:flex;overflow:hidden;transition:border-color .2s}
.iwrap:focus-within{border-color:var(--acc);box-shadow:var(--glow)}
textarea{flex:1;background:transparent;border:none;padding:9px 11px;color:var(--txt);resize:none;outline:none;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;line-height:1.45;min-height:38px;max-height:110px;overflow-y:auto}
.sbtn{width:36px;height:36px;border-radius:8px;background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:15px;transition:all .2s}
.sbtn:not(:disabled):hover{box-shadow:var(--glow);transform:translateY(-1px)}
.sbtn:disabled{opacity:.35;cursor:not-allowed}

/* ── TOAST ── */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s3);border:1px solid var(--br);color:var(--txt);padding:8px 16px;border-radius:8px;font-size:12px;font-family:'IBM Plex Mono',monospace;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}
#toast.bad{background:var(--red-dim);border-color:var(--red);color:var(--red)}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--s1);border:1px solid var(--br);box-shadow:var(--nglow);border-radius:14px;padding:22px;width:305px;display:flex;flex-direction:column;gap:13px}
.modal h2{font-size:15px;font-weight:700}
.tabs{display:flex;background:var(--s2);padding:3px;border-radius:7px;gap:2px}
.tab{flex:1;padding:7px;border:none;background:transparent;color:var(--txt2);cursor:pointer;border-radius:5px;font-weight:600;font-size:12px;transition:all .2s;font-family:'IBM Plex Sans',sans-serif}
.tab.on{background:var(--acc);color:#fff}
.tc{display:none;flex-direction:column;gap:8px}.tc.on{display:flex}
.fi{background:var(--s2);border:1px solid var(--br);padding:9px 11px;border-radius:7px;color:var(--txt);outline:none;font-family:'IBM Plex Sans',sans-serif;font-size:13px;width:100%;transition:border-color .2s}
.fi:focus{border-color:var(--acc)}
.fi::placeholder{color:var(--txt3)}
.mbtn{padding:9px 14px;border-radius:7px;border:none;font-weight:700;cursor:pointer;background:var(--acc);color:#fff;font-family:'IBM Plex Sans',sans-serif;font-size:13px;transition:opacity .15s}
.mbtn:hover{opacity:.82}
.mbtn.gh{background:transparent;border:1px solid var(--br);color:var(--txt2)}
.mbtn.gh:hover{opacity:1;border-color:var(--txt2)}
.merr{font-size:11px;color:var(--red);font-family:'IBM Plex Mono',monospace;display:none;padding:6px 9px;background:var(--red-dim);border-radius:6px}
.chip{font-size:11px;background:var(--s3);padding:3px 7px;border-radius:5px;font-family:'IBM Plex Mono',monospace;color:var(--acc);cursor:pointer}
.chip:hover{background:var(--red-dim);color:var(--red)}
</style>
</head>
<body>

<div id="nolib">
  <div style="font-size:32px">📡</div>
  <div class="t">No se pudo cargar PeerJS</div>
  <div class="b">Comprueba tu conexión. O descarga <a href="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js" target="_blank">peerjs.min.js</a> y ponlo junto al HTML.</div>
  <button onclick="location.reload()">↺ Reintentar</button>
</div>

<div id="splash">
  <div class="logo">nova<b>chat</b></div>
  <div class="sub">nova · chat · p2p</div>
  <div class="card">
    <div class="lbl">Tu código único</div>
    <div id="splashCode">····</div>
    <div class="hint">Compártelo para recibir mensajes</div>
    <button id="enterBtn" disabled>Cargando…</button>
  </div>
</div>

<div id="app" style="display:none;flex-direction:column;height:100vh">
  <div id="bar">
    <div class="dot spin" id="dot"></div>
    <span id="stxt">conectando…</span>
    <div id="idbadge" class="badge" onclick="copyCode()" title="Copiar código">ID <b id="myid">····</b></div>
    <div id="nickbadge" class="badge" onclick="editNick()" title="Tu nombre visible">✎ <span id="nickspan">Sin nombre</span></div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="sb-top">
        <span class="sb-lbl">Chats</span>
        <div class="add-btn" onclick="openModal()">＋</div>
      </div>
      <div class="clist" id="clist"></div>
    </div>
    <div class="area" id="area">
      <div class="nosel"><div class="nosel-ico">💬</div><div class="nosel-txt">Selecciona un chat</div></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<div class="ov" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Nuevo chat</h2>
    <div class="tabs">
      <button class="tab on" onclick="setTab('dm')">Directo</button>
      <button class="tab"    onclick="setTab('grp')">Grupo</button>
    </div>
    <div class="tc on" id="tdm">
      <input class="fi" id="dmname" placeholder="Apodo del contacto" autocomplete="off">
      <input class="fi" id="dmcode" placeholder="Código (4 dígitos)" maxlength="4" inputmode="numeric">
    </div>
    <div class="tc" id="tgrp">
      <input class="fi" id="grpname" placeholder="Nombre del grupo" autocomplete="off">
      <div id="mbox" style="display:flex;gap:5px;flex-wrap:wrap;min-height:4px"></div>
      <div style="display:flex;gap:6px">
        <input class="fi" id="mbrin" placeholder="Código miembro (4 dígitos)" maxlength="4" inputmode="numeric" style="flex:1">
        <button class="mbtn" onclick="addMbr()" style="padding:9px 13px">+</button>
      </div>
    </div>
    <div class="merr" id="merr"></div>
    <div style="display:flex;gap:7px;justify-content:flex-end">
      <button class="mbtn gh" onclick="closeModal()">Cancelar</button>
      <button class="mbtn"    onclick="createChat()">Crear</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════
//  CARGAR PEERJS — 3 CDNs con fallback
// ══════════════════════════════════════════════
const CDNS = [
  'https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js',
  'https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js',
  'https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js'
];
let libOk = false;
(function tryLoad(i) {
  if (i >= CDNS.length) {
    document.getElementById('nolib').style.display  = 'flex';
    document.getElementById('splash').style.display = 'none';
    return;
  }
  const s = document.createElement('script');
  s.src     = CDNS[i];
  s.onload  = () => { libOk = true; document.getElementById('enterBtn').disabled = false; document.getElementById('enterBtn').textContent = 'ENTRAR'; };
  s.onerror = () => tryLoad(i + 1);
  document.head.appendChild(s);
})(0);

// ══════════════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════════════
const myCode = (() => {
  let c = localStorage.getItem('nc_code');
  if (!c) { c = String(Math.floor(1000 + Math.random() * 9000)); localStorage.setItem('nc_code', c); }
  return c;
})();
document.getElementById('splashCode').textContent = myCode;

let myNick = localStorage.getItem('nc_nick') || '';

let peer = null;
let chats = {};   // { id: { type, name, members[], messages[] } }
let cur   = null;
let unread = {};

// peerId → DataConnection (solo conexiones abiertas)
const conns = {};
// memberCode → [{chatId, payload, msgIdx}]  (mensajes pendientes offline)
const offline = {};

// ══════════════════════════════════════════════
//  PERSISTENCIA
// ══════════════════════════════════════════════
function loadChats() {
  try { chats = JSON.parse(localStorage.getItem('nc_chats') || '{}'); } catch { chats = {}; }
}
function saveChats() { localStorage.setItem('nc_chats', JSON.stringify(chats)); }

// ══════════════════════════════════════════════
//  UTILIDADES
// ══════════════════════════════════════════════
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hhmm(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function dayStr(ts) {
  if (!ts) return '';
  const d = new Date(ts), n = new Date();
  if (d.toDateString() === n.toDateString()) return 'HOY';
  const y = new Date(n); y.setDate(n.getDate()-1);
  if (d.toDateString() === y.toDateString()) return 'AYER';
  return d.toLocaleDateString('es',{day:'2-digit',month:'short'}).toUpperCase();
}
let _tt;
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' '+type : '');
  clearTimeout(_tt); _tt = setTimeout(() => t.className = '', 2500);
}
function setStatus(s, txt) {
  document.getElementById('dot').className = 'dot ' + s;
  document.getElementById('stxt').textContent = txt;
}

// ══════════════════════════════════════════════
//  PEERJS
// ══════════════════════════════════════════════
function initPeer() {
  if (typeof Peer === 'undefined') { setStatus('err','PeerJS no cargó'); return; }
  setStatus('spin','conectando…');

  peer = new Peer('nc_' + myCode);

  peer.on('open', () => setStatus('on','en línea'));
  peer.on('connection', conn => setupConn(conn));
  peer.on('disconnected', () => {
    setStatus('spin','reconectando…');
    setTimeout(() => peer && !peer.destroyed && peer.reconnect(), 2000);
  });
  peer.on('error', err => {
    if (err.type === 'peer-unavailable') return; // normal, lo maneja connect()
    if (err.type === 'unavailable-id')   { setStatus('err','ID ocupado'); return; }
    if (err.type === 'network')          { setStatus('err','sin red'); return; }
  });
}

// Configura todos los listeners de una conexión (entrante o saliente)
function setupConn(conn) {
  conn.on('open', () => {
    conns[conn.peer] = conn;
    // Entregar mensajes pendientes para este peer
    flushOffline(conn.peer.replace('nc_',''), conn);
  });
  conn.on('data', data => {
    if (data && data.type === 'msg') receiveMsg(data);
  });
  conn.on('close', () => { if (conns[conn.peer] === conn) delete conns[conn.peer]; });
  conn.on('error', ()  => { if (conns[conn.peer] === conn) delete conns[conn.peer]; });
}

// Abre (o reutiliza) conexión con un peer
function openConn(code) {
  if (!peer || peer.destroyed) return Promise.reject(new Error('peer not ready'));
  const pid = 'nc_' + code;
  if (conns[pid] && conns[pid].open) return Promise.resolve(conns[pid]);

  return new Promise((resolve, reject) => {
    const conn = peer.connect(pid, { reliable: true });
    const timer = setTimeout(() => reject(new Error('offline')), 6000);

    setupConn(conn);

    conn.on('open', () => { clearTimeout(timer); resolve(conn); });

    // Detectar peer-unavailable para este código específico
    function onPeerErr(err) {
      if (err.type === 'peer-unavailable' && err.message && err.message.includes(code)) {
        clearTimeout(timer);
        peer.off('error', onPeerErr);
        reject(new Error('offline'));
      }
    }
    peer.on('error', onPeerErr);
    conn.on('open',  () => peer.off('error', onPeerErr));
    conn.on('close', () => peer.off('error', onPeerErr));
  });
}

// Vacía la cola offline de un peer cuando se conecta
function flushOffline(code, conn) {
  const items = offline[code];
  if (!items || !items.length) return;
  const done = [];
  for (const item of items) {
    try {
      conn.send(item.payload);
      // Marcar como enviado
      const msg = chats[item.chatId] && chats[item.chatId].messages[item.msgIdx];
      if (msg) msg.status = 'ok';
      done.push(item);
    } catch { /* sigue sin conexión */ }
  }
  offline[code] = items.filter(i => !done.includes(i));
  if (done.length) {
    saveChats();
    if (cur && done.some(i => i.chatId === cur)) renderMsgs();
    toast('Mensajes entregados ✓','ok');
  }
}

// ══════════════════════════════════════════════
//  RECIBIR MENSAJE
// ══════════════════════════════════════════════
function receiveMsg(d) {
  // d = { type, chatId, chatType, chatName, sender, senderName, text, ts, members }
  const { chatId, chatType, chatName, sender, senderName, text, ts, members } = d;

  if (!chats[chatId]) {
    // Crear el chat con los metadatos que vienen en el propio mensaje
    const isGrp = chatType === 'grp';
    const name  = isGrp
      ? (chatName || 'Grupo')
      : ((senderName && senderName !== sender) ? senderName : sender);

    chats[chatId] = {
      type:     isGrp ? 'grp' : 'dm',
      name:     name,
      members:  members && members.length ? members : [myCode, sender],
      messages: []
    };
    toast('Nuevo mensaje de ' + name, 'ok');
  } else {
    // Actualizar lista de miembros si viene más completa
    if (members && members.length && chatType === 'grp') {
      chats[chatId].members = members;
    }
  }

  chats[chatId].messages.push({ sender, senderName: senderName || sender, text, ts: ts || Date.now(), status:'ok' });
  saveChats();

  if (cur === chatId) renderMsgs();
  else { unread[chatId] = true; }
  renderList();
}

// ══════════════════════════════════════════════
//  ENVIAR MENSAJE
// ══════════════════════════════════════════════
async function sendMsg() {
  const ta   = document.getElementById('ta');
  const sbtn = document.getElementById('sbtn');
  if (!ta) return;
  const text = ta.value.trim();
  if (!text || !cur) return;

  const snap = cur;
  const chat = chats[snap];
  if (!chat) return;

  const ts     = Date.now();
  const msgIdx = chat.messages.length;

  // Guardar localmente inmediatamente
  chat.messages.push({ sender: myCode, senderName: myNick || myCode, text, ts, status:'wait' });
  saveChats();
  ta.value = ''; ta.style.height = 'auto';
  sbtn.disabled = true;
  renderMsgs(); renderList();

  // Payload completo con metadatos del chat para que el receptor pueda reconstruirlo
  const payload = {
    type:       'msg',
    chatId:     snap,
    chatType:   chat.type,
    chatName:   chat.name,
    sender:     myCode,
    senderName: myNick || myCode,
    text,
    ts,
    members:    chat.members   // lista completa → receptor puede reenviar en grupos
  };

  // Enviar a TODOS los miembros excepto yo
  const targets = chat.members.filter(m => m !== myCode);
  let allOk = true;

  for (const code of targets) {
    try {
      const conn = await openConn(code);
      conn.send(payload);
    } catch {
      // Peer offline → encolar
      if (!offline[code]) offline[code] = [];
      const dup = offline[code].some(e => e.payload.ts === ts && e.chatId === snap);
      if (!dup) offline[code].push({ chatId: snap, payload, msgIdx });
      allOk = false;
    }
  }

  // Actualizar estado del mensaje
  if (chat.messages[msgIdx]) chat.messages[msgIdx].status = allOk ? 'ok' : 'wait';
  saveChats();
  renderMsgs();
  sbtn.disabled = false;
}

// ══════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════
function renderList() {
  const el  = document.getElementById('clist');
  const ids = Object.keys(chats);
  if (!ids.length) {
    el.innerHTML = `<div style="padding:22px 10px;text-align:center;font-size:11px;color:var(--txt3);font-family:'IBM Plex Mono',monospace;line-height:2.3">Sin chats.<br>Pulsa ＋ para empezar.</div>`;
    return;
  }
  el.innerHTML = ids.map(id => {
    const c    = chats[id];
    const name = esc(c.name || 'Chat');
    const prev = esc(c.messages.at(-1)?.text || 'Sin mensajes');
    const isU  = unread[id] && cur !== id;
    return `<div class="ci${cur===id?' active':''}${isU?' unread':''}" onclick="openChat('${id}')">
      <div class="av ${c.type}">${name[0].toUpperCase()}</div>
      <div class="ci-info">
        <div class="ci-name" ondblclick="renameInline(event,'${id}')" title="Doble clic para renombrar">${name}</div>
        <div class="ci-prev">${prev}</div>
      </div>
      <div class="udot"></div>
      <div class="delbtn" onclick="delChat(event,'${id}')">×</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
//  ABRIR CHAT
// ══════════════════════════════════════════════
function openChat(id) {
  cur = id; delete unread[id]; renderList();
  const c   = chats[id];
  const sub = c.type === 'grp'
    ? c.members.length + ' miembros: ' + c.members.join(', ')
    : (c.members.find(m => m !== myCode) || '');

  document.getElementById('area').innerHTML = `
    <div class="chdr">
      <div class="chdr-info">
        <div class="chdr-name" id="chdr-name">${esc(c.name)}</div>
        <div class="chdr-sub">${esc(sub)}</div>
      </div>
      <button class="ren-btn" onclick="renameHeader('${id}')">✎ Renombrar</button>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="ibar">
      <div class="iwrap"><textarea id="ta" placeholder="Mensaje… · Enter envía · Shift+Enter salto" rows="1"></textarea></div>
      <button class="sbtn" id="sbtn" onclick="sendMsg()">➔</button>
    </div>`;

  const ta = document.getElementById('ta');
  ta.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); } });
  ta.addEventListener('input',   () => { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,110)+'px'; });
  renderMsgs(); ta.focus();
}

// ══════════════════════════════════════════════
//  RENDER MENSAJES
// ══════════════════════════════════════════════
function renderMsgs() {
  const el = document.getElementById('msgs');
  if (!el || !cur || !chats[cur]) return;
  const msgs = chats[cur].messages;
  const isGrp = chats[cur].type === 'grp';

  if (!msgs.length) {
    el.innerHTML = `<div style="text-align:center;padding:36px 0;font-size:11px;color:var(--txt3);font-family:'IBM Plex Mono',monospace">Sin mensajes todavía 👋</div>`;
    return;
  }

  const ST = { ok:'✓', wait:'⏳', no:'✕' };
  let html='', lastDay='', lastSender='';

  for (const m of msgs) {
    const me   = m.sender === myCode;
    const day  = dayStr(m.ts);
    const cont = lastSender === m.sender && day === lastDay;

    if (day !== lastDay) { html += `<div class="dsep">${day}</div>`; lastDay = day; lastSender = ''; }

    const st = me ? `<span class="mst ${m.status||'ok'}">${ST[m.status]||'✓'}</span>` : '';

    // En grupos, mostrar quién habla (solo primer mensaje consecutivo)
    const senderTag = (!me && isGrp && !cont)
      ? `<div class="msender">${esc(m.senderName || m.sender)}</div>` : '';

    html += `<div class="mrow${me?' me':''}${cont?' cont':''}">
      ${me ? st : ''}
      <div class="mbody">
        ${senderTag}
        <div class="bub ${me?'me':'them'}">${esc(m.text)}</div>
      </div>
      <span class="mtime">${hhmm(m.ts)}</span>
      ${!me ? st : ''}
    </div>`;

    lastSender = m.sender;
  }

  el.innerHTML = html;
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

// ══════════════════════════════════════════════
//  RENOMBRAR
// ══════════════════════════════════════════════
function renameHeader(id) {
  const el = document.getElementById('chdr-name');
  if (!el) return;
  const old = chats[id]?.name || '';
  el.contentEditable = 'true';
  el.style.outline = 'none';
  el.style.borderBottom = '1px solid var(--acc)';
  el.focus();
  const range = document.createRange(); range.selectNodeContents(el);
  window.getSelection().removeAllRanges(); window.getSelection().addRange(range);

  const done = () => {
    el.contentEditable = 'false'; el.style.borderBottom = '';
    const n = el.textContent.trim();
    if (n && n !== old) { chats[id].name = n; saveChats(); renderList(); toast('Nombre actualizado ✓','ok'); }
    else el.textContent = old;
  };
  el.onblur   = done;
  el.onkeydown = e => { if (e.key==='Enter'){e.preventDefault();el.blur();} if(e.key==='Escape'){el.textContent=old;el.blur();} };
}

function renameInline(e, id) {
  e.stopPropagation();
  const el = e.target;
  const old = chats[id]?.name || '';
  el.contentEditable = 'true';
  el.style.outline = 'none'; el.style.borderBottom = '1px solid var(--acc)';
  el.focus();
  const range = document.createRange(); range.selectNodeContents(el);
  window.getSelection().removeAllRanges(); window.getSelection().addRange(range);

  const done = () => {
    el.contentEditable = 'false'; el.style.borderBottom = '';
    const n = el.textContent.trim();
    if (n && n !== old) {
      chats[id].name = n; saveChats();
      if (cur === id) { const h = document.getElementById('chdr-name'); if(h) h.textContent = n; }
      renderList(); toast('Nombre actualizado ✓','ok');
    } else el.textContent = old;
  };
  el.onblur    = done;
  el.onkeydown = e => { if(e.key==='Enter'){e.preventDefault();el.blur();} if(e.key==='Escape'){el.textContent=old;el.blur();} };
}

// ══════════════════════════════════════════════
//  ELIMINAR CHAT
// ══════════════════════════════════════════════
function delChat(e, id) {
  e.stopPropagation();
  if (!confirm('¿Eliminar este chat?')) return;
  delete chats[id]; delete unread[id];
  if (cur === id) {
    cur = null;
    document.getElementById('area').innerHTML = `<div class="nosel"><div class="nosel-ico">💬</div><div class="nosel-txt">Selecciona un chat</div></div>`;
  }
  saveChats(); renderList(); toast('Chat eliminado');
}

// ══════════════════════════════════════════════
//  MODAL NUEVO CHAT
// ══════════════════════════════════════════════
let grpMbrs = [], mtab = 'dm';

function openModal() {
  grpMbrs = [];
  ['dmname','dmcode','grpname','mbrin'].forEach(i => { const el=document.getElementById(i); if(el) el.value=''; });
  document.getElementById('merr').style.display = 'none';
  renderChips(); setTab('dm');
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('dmname')?.focus(), 40);
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

function setTab(t) {
  mtab = t;
  document.getElementById('tdm').className  = t==='dm'  ? 'tc on' : 'tc';
  document.getElementById('tgrp').className = t==='grp' ? 'tc on' : 'tc';
  document.querySelectorAll('.tab').forEach((b,i) => b.className = (i===0&&t==='dm')||(i===1&&t==='grp') ? 'tab on' : 'tab');
}

function showErr(msg) { const e=document.getElementById('merr'); e.textContent=msg; e.style.display='block'; }

function createChat() {
  document.getElementById('merr').style.display = 'none';
  const id = (mtab==='dm'?'dm_':'grp_') + Date.now();

  if (mtab === 'dm') {
    const code = document.getElementById('dmcode').value.trim();
    const name = document.getElementById('dmname').value.trim();
    if (!name)                  return showErr('El apodo no puede estar vacío.');
    if (!/^\d{4}$/.test(code))  return showErr('El código debe ser 4 dígitos numéricos.');
    if (code === myCode)         return showErr('No puedes chatear contigo mismo.');
    if (Object.values(chats).some(c => c.type==='dm' && c.members.includes(code)))
      return showErr('Ya tienes un chat con ese contacto.');
    chats[id] = { type:'dm', name, members:[myCode, code], messages:[] };

  } else {
    const name = document.getElementById('grpname').value.trim();
    if (!name)           return showErr('El nombre del grupo no puede estar vacío.');
    if (!grpMbrs.length) return showErr('Añade al menos un miembro.');
    chats[id] = { type:'grp', name, members:[myCode, ...grpMbrs], messages:[] };
  }

  saveChats(); renderList(); closeModal(); openChat(id); toast('Chat creado ✓','ok');
}

function addMbr() {
  const m = document.getElementById('mbrin').value.trim();
  if (!/^\d{4}$/.test(m))   return showErr('Código inválido (4 dígitos).');
  if (m === myCode)          return showErr('No puedes añadirte a ti mismo.');
  if (grpMbrs.includes(m))  return showErr('Ese código ya está en el grupo.');
  document.getElementById('merr').style.display = 'none';
  grpMbrs.push(m);
  document.getElementById('mbrin').value = '';
  renderChips();
}

function removeMbr(i) { grpMbrs.splice(i, 1); renderChips(); }
function renderChips() {
  document.getElementById('mbox').innerHTML = grpMbrs.map((m,i) =>
    `<span class="chip" onclick="removeMbr(${i})" title="Clic para eliminar">${esc(m)} ×</span>`
  ).join('');
}

// ══════════════════════════════════════════════
//  NICKNAME
// ══════════════════════════════════════════════
function editNick() {
  const span = document.getElementById('nickspan');
  if (!span) return;
  const old = myNick;
  // Build input programmatically to avoid quote-escaping issues
  const badge = span.parentElement;
  badge.innerHTML = '✎ <input id="nickInput" placeholder="Tu nombre" maxlength="20" autocomplete="off" style="background:transparent;border:none;border-bottom:1px solid var(--acc);color:var(--txt);outline:none;font-family:inherit;font-size:11px;width:80px;padding:0 2px">';
  const inp = document.getElementById('nickInput');
  inp.value = old;
  inp.addEventListener('blur', () => saveNick(inp.value));
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = old; inp.blur(); }
  });
  setTimeout(() => { inp.focus(); inp.select(); }, 20);
}
function saveNick(val) {
  myNick = val.trim();
  localStorage.setItem('nc_nick', myNick);
  const b = document.getElementById('nickbadge');
  if (b) b.innerHTML = '✎ <span id="nickspan">' + esc(myNick || 'Sin nombre') + '</span>';
  if (myNick) toast('Nombre: ' + myNick, 'ok');
}

// ══════════════════════════════════════════════
//  COPIAR CÓDIGO
// ══════════════════════════════════════════════
function copyCode() {
  navigator.clipboard.writeText(myCode)
    .then(() => toast('Código copiado: ' + myCode,'ok'))
    .catch(() => toast('No se pudo copiar','bad'));
}

// ══════════════════════════════════════════════
//  ARRANCAR APP
// ══════════════════════════════════════════════
document.getElementById('enterBtn').onclick = () => {
  if (!libOk) { toast('PeerJS todavía cargando…'); return; }
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display    = 'flex';
  document.getElementById('myid').textContent     = myCode;
  document.getElementById('nickspan').textContent = myNick || 'Sin nombre';
  loadChats(); renderList(); initPeer();
};
