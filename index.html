<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ch4t</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0e;--s1:#0e1117;--s2:#141820;--s3:#1c2230;--br:#252d3d;
  --acc:#4fffb0;--acc-dim:#1a3d2e;--red:#ff5577;--red-dim:#3d1520;
  --txt:#e8edf5;--txt2:#7a8599;--txt3:#3a4255;
  --glow:0 0 20px rgba(79,255,176,.18);
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200}
.s-logo{font-family:'IBM Plex Mono',monospace;font-size:54px;font-weight:700;letter-spacing:-3px;margin-bottom:6px}
.s-logo b{color:var(--acc)}
.s-sub{font-size:10px;letter-spacing:4px;color:var(--txt3);text-transform:uppercase;margin-bottom:36px}
.s-card{background:var(--s1);border:1px solid var(--br);border-radius:14px;padding:28px 32px;text-align:center;width:272px}
.s-lbl{font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-bottom:10px;font-family:'IBM Plex Mono',monospace}
#splashCode{font-family:'IBM Plex Mono',monospace;font-size:46px;font-weight:700;color:var(--acc);letter-spacing:8px;text-shadow:var(--glow);margin-bottom:6px}
.s-hint{font-size:11px;color:var(--txt3);margin-bottom:22px}
#enterBtn{width:100%;padding:11px;background:var(--acc);color:#000;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:all .2s}
#enterBtn:not(:disabled):hover{box-shadow:var(--glow);transform:translateY(-1px)}
#enterBtn:disabled{opacity:.45;cursor:not-allowed}

/* STATUS BAR */
#bar{height:36px;background:var(--s1);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 14px;gap:9px;font-size:11px;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--txt3);flex-shrink:0;transition:all .3s}
.dot.on{background:var(--acc);box-shadow:0 0 7px var(--acc)}
.dot.err{background:var(--red)}
.dot.spin{animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}
#stxt{color:var(--txt2);flex:1}
#badge{background:var(--s3);border:1px solid var(--br);padding:3px 11px;border-radius:6px;cursor:pointer;color:var(--acc);user-select:none;transition:all .2s}
#badge:hover{background:var(--acc-dim);border-color:var(--acc)}

/* LAYOUT */
.layout{flex:1;display:flex;overflow:hidden}
.sidebar{width:250px;background:var(--s1);border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0}
.sb-top{padding:11px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px}
.sb-top span{flex:1;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--txt3);font-family:'IBM Plex Mono',monospace}
.add-btn{width:25px;height:25px;border-radius:6px;background:var(--s2);border:1px solid var(--br);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s}
.add-btn:hover{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}
.clist{flex:1;overflow-y:auto;padding:5px;scrollbar-width:thin;scrollbar-color:var(--br) transparent}
.ci{padding:8px 9px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:8px;position:relative;margin-bottom:1px;transition:background .1s}
.ci:hover{background:var(--s2)}
.ci.active{background:var(--s3)}
.av{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px;flex-shrink:0}
.av.dm{background:#0e2038;color:#5ba3f5}.av.grp{background:var(--acc-dim);color:var(--acc)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-prev{font-size:11px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.unread-dot{width:7px;height:7px;border-radius:50%;background:var(--acc);flex-shrink:0;visibility:hidden}
.ci.unread .unread-dot{visibility:visible}
.del{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:19px;height:19px;border-radius:50%;background:var(--red-dim);color:var(--red);display:none;align-items:center;justify-content:center;font-size:13px;border:1px solid rgba(255,85,119,.2);cursor:pointer;transition:all .2s}
.ci:hover .del{display:flex}
.del:hover{background:var(--red);color:#fff}
.ren{display:inline-flex;align-items:center;justify-content:center;margin-left:6px;width:18px;height:18px;border-radius:4px;background:transparent;border:none;color:var(--txt3);cursor:pointer;font-size:12px;transition:all .2s;vertical-align:middle;flex-shrink:0}
.ren:hover{color:var(--acc);background:var(--acc-dim)}
.chdr-name-wrap{display:flex;align-items:center;gap:4px}
#renameInput{background:var(--s2);border:1px solid var(--acc);border-radius:6px;color:var(--txt);font-size:14px;font-weight:600;font-family:'IBM Plex Sans',sans-serif;outline:none;width:170px;padding:3px 8px}

/* CHAT AREA */
.area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.nosel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--txt3);gap:10px}
.nosel-ico{font-size:28px;opacity:.25}
.nosel-txt{font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:2px}
.chdr{height:48px;background:var(--s1);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 18px;flex-shrink:0}
.chdr-name{font-size:14px;font-weight:600}
.chdr-sub{font-size:11px;color:var(--txt3);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:1px;scrollbar-width:thin;scrollbar-color:var(--br) transparent}
.mrow{display:flex;align-items:flex-end;gap:5px;margin-bottom:1px}
.mrow.me{flex-direction:row-reverse}
.bub{max-width:68%;padding:8px 12px;border-radius:13px;font-size:13.5px;line-height:1.45;word-break:break-word;white-space:pre-wrap}
.bub.them{background:var(--s2);border-bottom-left-radius:3px}
.bub.me{background:var(--acc);color:#000;border-bottom-right-radius:3px;font-weight:500}
.mrow.cont .bub.them{border-top-left-radius:3px}
.mrow.cont .bub.me{border-top-right-radius:3px}
.mtime{font-size:10px;color:var(--txt3);font-family:'IBM Plex Mono',monospace;white-space:nowrap;margin-bottom:2px;flex-shrink:0}
.mst{font-size:10px;align-self:flex-end;margin-bottom:3px;flex-shrink:0;font-family:'IBM Plex Mono',monospace}
.mst.ok{color:var(--acc)}.mst.wait{color:var(--txt3)}.mst.no{color:var(--red)}
.dsep{text-align:center;font-size:10px;color:var(--txt3);font-family:'IBM Plex Mono',monospace;letter-spacing:2px;padding:10px 0;display:flex;align-items:center;gap:10px}
.dsep::before,.dsep::after{content:'';flex:1;height:1px;background:var(--br)}

/* INPUT */
.ibar{padding:11px 14px;background:var(--s1);border-top:1px solid var(--br);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.iwrap{flex:1;background:var(--s2);border:1px solid var(--br);border-radius:9px;display:flex;overflow:hidden;transition:border-color .2s}
.iwrap:focus-within{border-color:var(--acc)}
textarea{flex:1;background:transparent;border:none;padding:9px 11px;color:var(--txt);resize:none;outline:none;font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;line-height:1.45;min-height:38px;max-height:110px;overflow-y:auto}
.sbtn{width:36px;height:36px;border-radius:8px;background:var(--acc);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#000;font-size:15px;transition:all .2s}
.sbtn:not(:disabled):hover{box-shadow:var(--glow);transform:translateY(-1px)}
.sbtn:disabled{opacity:.35;cursor:not-allowed}

/* TOAST */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--s3);border:1px solid var(--br);color:var(--txt);padding:8px 16px;border-radius:8px;font-size:12px;font-family:'IBM Plex Mono',monospace;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--acc-dim);border-color:var(--acc);color:var(--acc)}
#toast.bad{background:var(--red-dim);border-color:var(--red);color:var(--red)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--s1);border:1px solid var(--br);border-radius:14px;padding:22px;width:305px;display:flex;flex-direction:column;gap:13px}
.modal h2{font-size:15px;font-weight:700}
.tabs{display:flex;background:var(--s2);padding:3px;border-radius:7px;gap:2px}
.tab{flex:1;padding:7px;border:none;background:transparent;color:var(--txt2);cursor:pointer;border-radius:5px;font-weight:600;font-size:12px;transition:all .2s;font-family:'IBM Plex Sans',sans-serif}
.tab.on{background:var(--acc);color:#000}
.tc{display:none;flex-direction:column;gap:8px}.tc.on{display:flex}
.fi{background:var(--s2);border:1px solid var(--br);padding:9px 11px;border-radius:7px;color:var(--txt);outline:none;font-family:'IBM Plex Sans',sans-serif;font-size:13px;width:100%;transition:border-color .2s}
.fi:focus{border-color:var(--acc)}
.fi::placeholder{color:var(--txt3)}
.mbtn{padding:9px 14px;border-radius:7px;border:none;font-weight:700;cursor:pointer;background:var(--acc);color:#000;font-family:'IBM Plex Sans',sans-serif;font-size:13px;transition:opacity .15s}
.mbtn:hover{opacity:.82}
.mbtn.gh{background:transparent;border:1px solid var(--br);color:var(--txt2)}
.merr{font-size:11px;color:var(--red);font-family:'IBM Plex Mono',monospace;display:none;padding:6px 9px;background:var(--red-dim);border-radius:6px}
.chip{font-size:11px;background:var(--s3);padding:3px 7px;border-radius:5px;font-family:'IBM Plex Mono',monospace;color:var(--acc)}

/* NO PEER ERROR */
#nolib{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:20px;font-family:'IBM Plex Mono',monospace}
#nolib .ico{font-size:34px}
#nolib .t{color:var(--red);font-size:14px;font-weight:700}
#nolib .b{color:var(--txt2);font-size:12px;max-width:310px;line-height:1.9}
#nolib a{color:var(--acc)}
#nolib button{padding:9px 22px;background:var(--s2);border:1px solid var(--br);border-radius:7px;color:var(--txt);font-weight:600;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<!-- No lib screen -->
<div id="nolib">
  <div class="ico">📡</div>
  <div class="t">No se pudo cargar PeerJS</div>
  <div class="b">Ninguna CDN respondió. Comprueba tu conexión a internet.<br>
    O descarga <a href="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js" target="_blank">peerjs.min.js</a> y ponlo junto al HTML.</div>
  <button onclick="location.reload()">↺ Reintentar</button>
</div>

<!-- Splash -->
<div id="splash">
  <div class="s-logo">ch<b>4</b>t</div>
  <div class="s-sub">peer · to · peer</div>
  <div class="s-card">
    <div class="s-lbl">Tu código único</div>
    <div id="splashCode">····</div>
    <div class="s-hint">Compártelo para recibir mensajes</div>
    <button id="enterBtn" disabled>Cargando…</button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none;flex-direction:column;height:100vh">
  <div id="bar">
    <div class="dot spin" id="dot"></div>
    <span id="stxt">conectando…</span>
    <div id="badge" onclick="copyMyCode()" title="Copiar código">ID&nbsp;<b id="myid">····</b></div>
    <div id="nickbadge" onclick="editNick()" title="Cambiar tu nombre visible" style="background:var(--s3);border:1px solid var(--br);padding:3px 11px;border-radius:6px;cursor:pointer;color:var(--txt2);transition:all .2s;font-size:11px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
      ✎ <span id="nickspan">Sin nombre</span>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="sb-top">
        <span>Chats</span>
        <div class="add-btn" onclick="openModal()" title="Nuevo chat">＋</div>
      </div>
      <div class="clist" id="clist"></div>
    </div>
    <div class="area" id="area">
      <div class="nosel">
        <div class="nosel-ico">💬</div>
        <div class="nosel-txt">Selecciona un chat</div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal -->
<div class="ov" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Nuevo chat</h2>
    <div class="tabs">
      <button class="tab on" onclick="stab('dm')">Directo</button>
      <button class="tab"    onclick="stab('grp')">Grupo</button>
    </div>
    <div class="tc on" id="tdm">
      <input class="fi" id="dmname" placeholder="Apodo del contacto" autocomplete="off">
      <input class="fi" id="dmcode" placeholder="Código (4 dígitos)" maxlength="4" inputmode="numeric">
    </div>
    <div class="tc" id="tgrp">
      <input class="fi" id="grpname" placeholder="Nombre del grupo" autocomplete="off">
      <div id="mbox" style="display:flex;gap:5px;flex-wrap:wrap;min-height:2px"></div>
      <div style="display:flex;gap:6px">
        <input class="fi" id="mbrin" placeholder="Código miembro (4 dígitos)" maxlength="4" inputmode="numeric" style="flex:1">
        <button class="mbtn" onclick="addMbr()" style="padding:9px 13px">+</button>
      </div>
    </div>
    <div class="merr" id="merr"></div>
    <div style="display:flex;gap:7px;justify-content:flex-end">
      <button class="mbtn gh" onclick="closeModal()">Cancelar</button>
      <button class="mbtn"    onclick="createChat()">Crear</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  PEERJS LOADER — 3 CDNs con fallback
// ══════════════════════════════════════════════
const CDNS = [
  'https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js',
  'https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js',
  'https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js'
];
let libOk = false;

(function load(i) {
  if (i >= CDNS.length) {
    document.getElementById('nolib').style.display = 'flex';
    document.getElementById('splash').style.display = 'none';
    return;
  }
  const s = document.createElement('script');
  s.src = CDNS[i];
  s.onload = () => { libOk = true; onLibReady(); };
  s.onerror = () => load(i + 1);
  document.head.appendChild(s);
})(0);

function onLibReady() {
  const btn = document.getElementById('enterBtn');
  btn.disabled = false;
  btn.textContent = 'ENTRAR';
}

// ══════════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════════
const myCode = (() => {
  let c = localStorage.getItem('ch4t_code');
  if (!c) { c = String(Math.floor(1000 + Math.random() * 9000)); localStorage.setItem('ch4t_code', c); }
  return c;
})();
document.getElementById('splashCode').textContent = myCode;

// Nombre visible que se envía a los contactos al escribirles
let myNick = localStorage.getItem('ch4t_nick') || '';

let peer        = null;
let chats       = {};
let cur         = null;   // chatId activo
let grpMbrs     = [];
let mtab        = 'dm';
let unread      = {};

// conexiones abiertas: peerId → DataConnection
const conns = {};
// cola offline: memberCode → [{chatId, payload, idx}]
const queue = {};

// ══════════════════════════════════════════════
//  PERSISTENCIA
// ══════════════════════════════════════════════
function load()  { try { chats = JSON.parse(localStorage.getItem('ch4t_chats') || '{}'); } catch { chats = {}; } }
function save()  { localStorage.setItem('ch4t_chats', JSON.stringify(chats)); }

// ══════════════════════════════════════════════
//  UTILIDADES UI
// ══════════════════════════════════════════════
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hhmm(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function dateLabel(ts) {
  if (!ts) return '';
  const d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString()) return 'HOY';
  const y = new Date(now); y.setDate(now.getDate()-1);
  if (d.toDateString() === y.toDateString()) return 'AYER';
  return d.toLocaleDateString('es',{day:'2-digit',month:'short'}).toUpperCase();
}

let _tt; 
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show' + (type ? ' '+type : '');
  clearTimeout(_tt); _tt = setTimeout(() => t.className = '', 2500);
}

function setStatus(state, txt) {
  const d = document.getElementById('dot'), s = document.getElementById('stxt');
  d.className = 'dot ' + (state==='on' ? 'on' : state==='err' ? 'err' : 'spin');
  s.textContent = txt;
}

// ══════════════════════════════════════════════
//  PEER — inicialización
// ══════════════════════════════════════════════
function initPeer() {
  if (typeof Peer === 'undefined') { setStatus('err','PeerJS no cargó'); return; }

  setStatus('spin','conectando…');
  peer = new Peer('ch4t_' + myCode);

  peer.on('open', () => setStatus('on','en línea'));

  peer.on('connection', conn => attach(conn));

  peer.on('disconnected', () => {
    setStatus('spin','reconectando…');
    setTimeout(() => peer && !peer.destroyed && peer.reconnect(), 2000);
  });

  // Ignorar peer-unavailable globalmente (se maneja en connect())
  peer.on('error', err => {
    if (err.type === 'peer-unavailable') return;
    if (err.type === 'unavailable-id')   { setStatus('err','ID ocupado'); return; }
    if (err.type === 'network')          { setStatus('err','sin red'); return; }
    // otros errores no críticos: ignorar
  });
}

// ══════════════════════════════════════════════
//  CONEXIONES
// ══════════════════════════════════════════════

// Adjunta listeners a una conexión (entrante o saliente)
function attach(conn) {
  conn.on('open', () => {
    conns[conn.peer] = conn;
    // Vaciar cola pendiente
    const code = conn.peer.replace('ch4t_','');
    drainQueue(code, conn);
  });
  conn.on('data',  d  => { if (d?.type === 'msg') onMsg(d); });
  conn.on('close', () => { delete conns[conn.peer]; });
  conn.on('error', () => { delete conns[conn.peer]; });
}

// Devuelve una promesa con la conexión abierta, o rechaza si el peer no responde
function connect(code) {
  const pid = 'ch4t_' + code;
  if (conns[pid]?.open) return Promise.resolve(conns[pid]);

  return new Promise((resolve, reject) => {
    const conn  = peer.connect(pid, { reliable: true });
    const timer = setTimeout(() => reject(new Error('offline')), 6000);

    attach(conn);

    conn.on('open', () => { clearTimeout(timer); resolve(conn); });

    // Capturar peer-unavailable para este peer específico
    function onErr(err) {
      if (err.type === 'peer-unavailable' && err.message?.includes(code)) {
        clearTimeout(timer);
        peer.off('error', onErr);
        reject(new Error('offline'));
      }
    }
    peer.on('error', onErr);
    // Limpiar listener cuando la conexión se resuelve o cierra
    conn.on('open',  () => peer.off('error', onErr));
    conn.on('close', () => peer.off('error', onErr));
  });
}

// Vacía la cola de mensajes pendientes para un peer que acaba de conectar
function drainQueue(code, conn) {
  const items = queue[code];
  if (!items?.length) return;
  const sent = [];
  for (const item of items) {
    try {
      conn.send(item.payload);
      if (chats[item.chatId]?.messages[item.idx])
        chats[item.chatId].messages[item.idx].status = 'ok';
      sent.push(item);
    } catch { /* sigue offline */ }
  }
  // Quitar los enviados
  queue[code] = items.filter(i => !sent.includes(i));
  if (sent.length) {
    save();
    if (cur && sent.some(i => i.chatId === cur)) renderMsgs();
  }
}

// ══════════════════════════════════════════════
//  RECIBIR MENSAJE
// ══════════════════════════════════════════════
function onMsg({ chatId, sender, text, ts, senderName, members }) {
  if (!chats[chatId]) {
    // Chat nuevo: usar el nombre que el emisor nos envía, o su código como fallback
    const displayName = (senderName && senderName !== '#' + sender) ? senderName : sender;
    chats[chatId] = { type:'dm', name: displayName, members: members || [myCode, sender], messages:[] };
    // Notificación visual: nuevo contacto
    toast('Nuevo mensaje de ' + displayName, 'ok');
  }
  chats[chatId].messages.push({ sender, text, ts: ts || Date.now(), status:'ok' });
  save();
  if (cur === chatId) renderMsgs();
  else { unread[chatId] = true; }
  renderList();
}

// ══════════════════════════════════════════════
//  ENVIAR MENSAJE
// ══════════════════════════════════════════════
async function send() {
  const ta   = document.getElementById('ta');
  const sbtn = document.getElementById('sbtn');
  if (!ta) return;
  const text = ta.value.trim();
  if (!text || !cur) return;

  const ts    = Date.now();
  const idx   = chats[cur].messages.length;
  const snap  = cur;

  chats[snap].messages.push({ sender: myCode, text, ts, status: 'wait' });
  save();

  ta.value = ''; ta.style.height = 'auto';
  sbtn.disabled = true;
  renderMsgs(); renderList();

  const payload = { type:'msg', chatId: snap, sender: myCode, senderName: myNick || myCode, text, ts, members:[myCode, ...chats[snap].members.filter(m=>m!==myCode)] };

  for (const member of chats[snap].members.filter(m => m !== myCode)) {
    try {
      const conn = await connect(member);
      conn.send(payload);
      if (chats[snap]?.messages[idx]) chats[snap].messages[idx].status = 'ok';
    } catch {
      // Peer offline → encolar silenciosamente
      if (!queue[member]) queue[member] = [];
      const dup = queue[member].some(e => e.payload.ts === ts && e.chatId === snap);
      if (!dup) queue[member].push({ chatId: snap, payload, idx });
      // Mantener status como 'wait' (reloj) no como error
    }
  }

  save();
  renderMsgs();
  sbtn.disabled = false;
}

// ══════════════════════════════════════════════
//  RENDER SIDEBAR
// ══════════════════════════════════════════════
function renderList() {
  const el = document.getElementById('clist');
  const ids = Object.keys(chats);
  if (!ids.length) {
    el.innerHTML = `<div style="padding:22px 10px;text-align:center;font-size:11px;color:var(--txt3);font-family:'IBM Plex Mono',monospace;line-height:2.2">Sin chats.<br>Pulsa ＋ para empezar.</div>`;
    return;
  }
  el.innerHTML = ids.map(id => {
    const c    = chats[id];
    const name = esc(c.name || 'Chat');
    const prev = esc(c.messages.at(-1)?.text || 'Sin mensajes');
    const isU  = unread[id] && cur !== id;
    return `<div class="ci${cur===id?' active':''}${isU?' unread':''}" onclick="openChat('${id}')">
      <div class="av ${c.type}">${name[0].toUpperCase()}</div>
      <div class="ci-info">
        <div class="ci-name" ondblclick="renameSidebar(event,'${id}')" title="Doble clic para renombrar">${name}</div>
        <div class="ci-prev">${prev}</div>
      </div>
      <div class="unread-dot"></div>
      <div class="del" onclick="delChat(event,'${id}')" title="Eliminar">×</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
//  ABRIR CHAT
// ══════════════════════════════════════════════
function openChat(id) {
  cur = id; delete unread[id]; renderList();
  const c   = chats[id];
  const sub = c.type === 'grp' ? c.members.length + ' miembros' : c.members.find(m => m !== myCode) || '';
  document.getElementById('area').innerHTML = `
    <div class="chdr" id="chdr-wrap">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:6px">
          <span id="chdr-name" style="font-size:14px;font-weight:600">${esc(c.name)}</span>
          <button onclick="startRename('${id}')" title="Cambiar nombre"
            style="background:var(--s3);border:1px solid var(--br);color:var(--txt2);
                   cursor:pointer;border-radius:5px;padding:2px 7px;font-size:11px;
                   font-family:'IBM Plex Sans',sans-serif;transition:all .2s;white-space:nowrap"
            onmouseover="this.style.borderColor='var(--acc)';this.style.color='var(--acc)'"
            onmouseout="this.style.borderColor='var(--br)';this.style.color='var(--txt2)'"
          >✎ Renombrar</button>
        </div>
        <div class="chdr-sub">${esc(sub)}</div>
      </div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="ibar">
      <div class="iwrap">
        <textarea id="ta" placeholder="Mensaje… · Enter envía · Shift+Enter nueva línea" rows="1"></textarea>
      </div>
      <button class="sbtn" id="sbtn" onclick="send()">➔</button>
    </div>`;

  const ta = document.getElementById('ta');
  ta.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); send(); } });
  ta.addEventListener('input', () => { ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,110)+'px'; });

  renderMsgs(); ta.focus();
}

// ══════════════════════════════════════════════
//  RENDER MENSAJES
// ══════════════════════════════════════════════
function renderMsgs() {
  const el = document.getElementById('msgs');
  if (!el || !cur) return;
  const msgs = chats[cur].messages;
  if (!msgs.length) {
    el.innerHTML = `<div style="text-align:center;padding:36px 0;font-size:11px;color:var(--txt3);font-family:'IBM Plex Mono',monospace">Sin mensajes todavía 👋</div>`;
    return;
  }
  let html='', lastD='', lastS='';
  const ST = { ok:'✓', wait:'⏳', no:'✕' };
  msgs.forEach(m => {
    const me   = m.sender === myCode;
    const dStr = dateLabel(m.ts);
    const cont = lastS === m.sender && dStr === lastD;
    if (dStr !== lastD) { html += `<div class="dsep">${dStr}</div>`; lastD=dStr; }
    const stHtml = me ? `<span class="mst ${m.status||'ok'}">${ST[m.status]||'✓'}</span>` : '';
    html += `<div class="mrow${me?' me':''}${cont?' cont':''}">
      ${me ? stHtml : ''}
      <div class="bub ${me?'me':'them'}">${esc(m.text)}</div>
      <span class="mtime">${hhmm(m.ts)}</span>
      ${!me ? stHtml : ''}
    </div>`;
    lastS = m.sender;
  });
  el.innerHTML = html;
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

// ══════════════════════════════════════════════
//  ELIMINAR CHAT
// ══════════════════════════════════════════════
function delChat(e, id) {
  e.stopPropagation();
  if (!confirm('¿Eliminar este chat?')) return;
  delete chats[id]; delete unread[id];
  if (cur === id) {
    cur = null;
    document.getElementById('area').innerHTML = `<div class="nosel"><div class="nosel-ico">💬</div><div class="nosel-txt">Selecciona un chat</div></div>`;
  }
  save(); renderList(); toast('Chat eliminado');
}

// ══════════════════════════════════════════════
//  RENOMBRAR CHAT
// ══════════════════════════════════════════════
function renameSidebar(e, id) {
  e.stopPropagation();
  const el = e.target;
  const old = chats[id]?.name || '';
  el.contentEditable = 'true';
  el.style.outline = 'none';
  el.style.borderBottom = '1px solid var(--acc)';
  el.focus();
  // Select all
  const range = document.createRange();
  range.selectNodeContents(el);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  function commit() {
    el.contentEditable = 'false';
    el.style.borderBottom = '';
    const newName = el.textContent.trim();
    if (newName && newName !== old) {
      chats[id].name = newName;
      save();
      if (cur === id) {
        const hn = document.getElementById('chdr-name');
        if (hn) hn.textContent = newName;
      }
      renderList();
      toast('Nombre cambiado ✓', 'ok');
    } else {
      el.textContent = old; // revert
    }
  }
  el.onblur = commit;
  el.onkeydown = ev => {
    if (ev.key === 'Enter') { ev.preventDefault(); el.blur(); }
    if (ev.key === 'Escape') { el.textContent = old; el.blur(); }
  };
}

function startRename(id) {
  if (document.getElementById('renameInput')) return; // ya hay un input abierto
  const nameEl = document.getElementById('chdr-name');
  const renBtn = document.getElementById('chdr-renbtn');
  if (!nameEl || !chats[id]) return;

  const prev = chats[id].name || '';

  // Cambiar el span por un input inline
  nameEl.style.display = 'none';
  if (renBtn) renBtn.style.display = 'none';

  const inp = document.createElement('input');
  inp.id = 'renameInput';
  inp.value = prev;
  inp.maxLength = 30;
  inp.placeholder = 'Nombre del chat…';
  inp.autocomplete = 'off';
  inp.style.cssText = 'background:transparent;border:none;border-bottom:1.5px solid var(--acc);' +
    'color:var(--txt);font-size:14px;font-weight:600;font-family:inherit;outline:none;' +
    'width:160px;padding:0 2px;';

  nameEl.parentElement.insertBefore(inp, nameEl);
  inp.focus(); inp.select();

  function commit() {
    const val = inp.value.trim();
    const final = val || prev;
    if (val && val !== prev && chats[id]) {
      chats[id].name = val;
      save();
      renderList();
      toast('Nombre actualizado ✓', 'ok');
    }
    inp.remove();
    nameEl.textContent = final;
    nameEl.style.display = '';
    if (renBtn) renBtn.style.display = '';
  }

  inp.addEventListener('blur', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.value = prev; inp.blur(); }
  });
}

// ══════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════
function openModal() {
  grpMbrs = [];
  ['dmname','dmcode','grpname','mbrin'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('merr').style.display = 'none';
  renderMbrs(); stab('dm');
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('dmname').focus(), 40);
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

function stab(t) {
  mtab = t;
  document.getElementById('tdm').className  = t==='dm'  ? 'tc on' : 'tc';
  document.getElementById('tgrp').className = t==='grp' ? 'tc on' : 'tc';
  document.querySelectorAll('.tab').forEach((b,i) => b.className = (i===0&&t==='dm')||(i===1&&t==='grp') ? 'tab on' : 'tab');
}

function createChat() {
  const err  = document.getElementById('merr');
  const show = msg => { err.textContent=msg; err.style.display='block'; };
  err.style.display = 'none';
  const id = (mtab==='dm'?'dm_':'grp_') + Date.now();
  if (mtab === 'dm') {
    const code = document.getElementById('dmcode').value.trim();
    const name = document.getElementById('dmname').value.trim();
    if (!name)               return show('El apodo no puede estar vacío.');
    if (!/^\d{4}$/.test(code)) return show('El código debe ser 4 dígitos numéricos.');
    if (code === myCode)     return show('No puedes chatear contigo mismo 😅');
    if (Object.values(chats).some(c => c.type==='dm' && c.members.includes(code)))
      return show('Ya tienes un chat con ese contacto.');
    chats[id] = { type:'dm', name, members:[myCode, code], messages:[] };
  } else {
    const name = document.getElementById('grpname').value.trim();
    if (!name)          return show('El nombre del grupo no puede estar vacío.');
    if (!grpMbrs.length) return show('Añade al menos un miembro.');
    chats[id] = { type:'grp', name, members:[myCode, ...grpMbrs], messages:[] };
  }
  save(); renderList(); closeModal(); openChat(id); toast('Chat creado ✓','ok');
}

function addMbr() {
  const m = document.getElementById('mbrin').value.trim();
  const e = document.getElementById('merr');
  if (!/^\d{4}$/.test(m))    { e.textContent='Código inválido (4 dígitos).'; e.style.display='block'; return; }
  if (m===myCode)             { e.textContent='No puedes añadirte a ti mismo.'; e.style.display='block'; return; }
  if (grpMbrs.includes(m))   { e.textContent='Ese código ya está en el grupo.'; e.style.display='block'; return; }
  e.style.display='none'; grpMbrs.push(m); document.getElementById('mbrin').value=''; renderMbrs();
}

function renderMbrs() {
  document.getElementById('mbox').innerHTML = grpMbrs.map(m => `<span class="chip">${esc(m)}</span>`).join('');
}

// ══════════════════════════════════════════════
//  COPIAR CÓDIGO
// ══════════════════════════════════════════════
function copyMyCode() {
  navigator.clipboard.writeText(myCode)
    .then(() => toast('Código copiado: ' + myCode, 'ok'))
    .catch(() => toast('No se pudo copiar','bad'));
}

function editNick() {
  const span = document.getElementById('nickspan');
  if (!span) return;
  const cur_nick = myNick || '';
  span.parentElement.innerHTML = `✎ <input id="nickInput" value="${cur_nick.replace(/"/g,'&quot;')}"
    placeholder="Tu nombre" maxlength="20" autocomplete="off"
    style="background:transparent;border:none;border-bottom:1px solid var(--acc);color:var(--txt);
           outline:none;font-family:inherit;font-size:11px;width:80px;padding:0 2px"
    onblur="saveNick(this.value)"
    onkeydown="if(event.key==='Enter')this.blur(); else if(event.key==='Escape'){this.value='${cur_nick}';this.blur()}"
  >`;
  setTimeout(() => { const i = document.getElementById('nickInput'); if(i){i.focus();i.select();} }, 20);
}

function saveNick(val) {
  myNick = val.trim();
  localStorage.setItem('ch4t_nick', myNick);
  const badge = document.getElementById('nickbadge');
  if (badge) badge.innerHTML = '✎ <span id="nickspan">' + esc(myNick || 'Sin nombre') + '</span>';
  if (myNick) toast('Nombre guardado: ' + myNick, 'ok');
}

// ══════════════════════════════════════════════
//  ENTRAR
// ══════════════════════════════════════════════
document.getElementById('enterBtn').onclick = () => {
  if (!libOk) { toast('PeerJS todavía cargando…'); return; }
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').style.display    = 'flex';
  document.getElementById('myid').textContent     = myCode;
  load(); renderList(); initPeer();
  // Mostrar nick actual
  const ns = document.getElementById('nickspan');
  if (ns) ns.textContent = myNick || 'Sin nombre';
};
</script>
