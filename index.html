<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Directo P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #chat { flex: 1; border: 1px solid #444; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #000; }
        input { padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 5px; }
        button { padding: 10px; background: #00ff88; color: black; border: none; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .info { font-size: 0.8em; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Tu ID: <span id="mi-id" style="color: #00ff88;">Cargando...</span></h2>
    <div class="info">Comparte este ID con la otra persona.</div>

    <div id="conexion-area">
        <input type="text" id="id-destino" placeholder="Pegar ID del amigo">
        <button onclick="conectarAAmigo()">CONECTAR</button>
    </div>

    <div id="chat"></div>

    <div style="display:flex; flex-direction:column;">
        <input type="text" id="mensaje" placeholder="Escribe un mensaje...">
        <button onclick="enviarMensaje()">ENVIAR MENSAJE</button>
    </div>

    <script>
        const peer = new Peer();
        let conn;

        // Al abrir, te da tu ID
        peer.on('open', (id) => {
            document.getElementById('mi-id').innerText = id;
        });

        // Cuando alguien SE CONECTA a ti
        peer.on('connection', (c) => {
            conn = c;
            prepararChat();
        });

        // Cuando TÚ te conectas a alguien
        function conectarAAmigo() {
            const idDestino = document.getElementById('id-destino').value;
            conn = peer.connect(idDestino);
            prepararChat();
        }

        function prepararChat() {
            conn.on('data', (data) => {
                mostrarMensaje("Amigo", data);
            });
            conn.on('open', () => {
                mostrarMensaje("Sistema", "¡Conectados!");
            });
        }

        function enviarMensaje() {
            const msg = document.getElementById('mensaje').value;
            if (conn && conn.open) {
                conn.send(msg);
                mostrarMensaje("Tú", msg);
                document.getElementById('mensaje').value = "";
            } else {
                alert("Primero debes conectar con alguien usando su ID");
            }
        }

        function mostrarMensaje(autor, texto) {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div><b>${autor}:</b> ${texto}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
