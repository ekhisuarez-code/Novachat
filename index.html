<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaChat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;scrollbar-width:thin;scrollbar-color:rgba(255,100,0,.3) transparent}
:root{
  --bg:#07080b;--p1:#0d0f14;--p2:#13161d;--p3:#1a1e28;--p4:#232836;
  --br:rgba(255,80,0,.22);--br2:rgba(255,80,0,.45);
  --acc:#ff6b00;--adim:rgba(255,107,0,.12);
  --red:#f04060;--rdim:rgba(240,64,96,.12);
  --txt:#eceef4;--t2:#8892a4;--t3:#3d4558;
  --glow:0 0 24px rgba(255,107,0,.22);
  --ng:0 0 0 1px rgba(255,80,0,.3),0 0 30px rgba(255,80,0,.12);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background-image:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(255,100,0,.06),transparent 70%)}
.sp-logo{font-family:'Syne',sans-serif;font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1;margin-bottom:4px}
.sp-logo span{background:linear-gradient(135deg,#ff6b00,#ffb347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sp-sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:5px;color:var(--t3);text-transform:uppercase;margin-bottom:44px}
.sp-card{background:var(--p1);border:1px solid var(--br2);border-radius:18px;padding:32px;text-align:center;width:280px;box-shadow:var(--ng),inset 0 1px 0 rgba(255,255,255,.04);position:relative;overflow:hidden}
.sp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,0,.5),transparent)}
.sp-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;margin-bottom:14px}
#splashCode{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:600;background:linear-gradient(135deg,#ff6b00,#ffb347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:10px;margin-bottom:6px;filter:drop-shadow(0 0 16px rgba(255,107,0,.4))}
.sp-hint{font-size:12px;color:var(--t3);margin-bottom:26px}
#enterBtn{width:100%;padding:13px;background:linear-gradient(135deg,#ff6b00,#ff9500);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .25s;box-shadow:0 4px 20px rgba(255,107,0,.3)}
#enterBtn:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,107,0,.45)}
#enterBtn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

/* NO LIB */
#nolib{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:20px}
#nolib .nt{color:var(--red);font-size:15px;font-weight:700;font-family:'Syne',sans-serif}
#nolib .nb{color:var(--t2);font-size:13px;max-width:300px;line-height:1.9}
#nolib a{color:var(--acc)}
#nolib button{padding:10px 24px;background:var(--p2);border:1px solid var(--br2);border-radius:10px;color:var(--txt);font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
#nolib button:hover{border-color:var(--acc);color:var(--acc)}

/* STATUS BAR */
#bar{height:42px;background:var(--p1);border-bottom:1px solid var(--br);box-shadow:0 1px 0 var(--br);display:flex;align-items:center;padding:0 16px;gap:10px;font-size:11px;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:all .4s}
.dot.on{background:var(--acc);box-shadow:0 0 8px var(--acc)}
.dot.err{background:var(--red)}
.dot.spin{animation:bl 1.2s ease-in-out infinite}
@keyframes bl{0%,100%{opacity:.15}50%{opacity:1}}
#stxt{color:var(--t2);flex:1;font-size:11px}
.bdg{background:var(--p3);border:1px solid var(--br);padding:4px 11px;border-radius:7px;cursor:pointer;transition:all .2s;user-select:none;font-size:11px;white-space:nowrap;font-family:'JetBrains Mono',monospace}
.bdg:hover{border-color:var(--acc);background:var(--adim)}
#idbdg{color:var(--acc)}
#nickbdg{color:var(--t2);max-width:140px;overflow:hidden;text-overflow:ellipsis}

/* LAYOUT */
.layout{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
.sidebar{width:258px;background:var(--p1);border-right:1px solid var(--br);display:flex;flex-direction:column;flex-shrink:0}
.sbtop{padding:12px;border-bottom:1px solid var(--br);display:flex;align-items:center;gap:8px}
.sblbl{flex:1;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--t3)}
.addbtn{width:26px;height:26px;border-radius:7px;background:var(--adim);border:1px solid var(--br2);color:var(--acc);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0}
.addbtn:hover{background:rgba(255,107,0,.2);box-shadow:var(--glow)}
.clist{flex:1;overflow-y:auto;padding:6px}

/* CHAT ITEM */
.ci{padding:9px 10px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:9px;position:relative;margin-bottom:2px;transition:all .15s}
.ci:hover{background:var(--p2)}
.ci.active{background:var(--p3);box-shadow:inset 0 0 0 1px var(--br)}
/* Avatar — puede ser imagen o letra */
.av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;flex-shrink:0;overflow:hidden;background:linear-gradient(135deg,#0d2040,#1a3a60);color:#6ab0ff}
.av img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.cinfo{flex:1;min-width:0}
.cname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px}
.cprev{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.udot{width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc);flex-shrink:0;opacity:0;transform:scale(0);transition:all .25s}
.ci.unread .udot{opacity:1;transform:scale(1)}
.delbtn{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:var(--rdim);color:var(--red);display:none;align-items:center;justify-content:center;font-size:13px;border:1px solid rgba(240,64,96,.2);cursor:pointer;transition:all .2s}
.ci:hover .delbtn{display:flex}
.delbtn:hover{background:var(--red);color:#fff}

/* AREA */
.area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);background-image:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(255,80,0,.03),transparent 70%)}
.nosel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t3);gap:12px}
.nosel-ico{font-size:32px;opacity:.15;filter:grayscale(1)}
.nosel-txt{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase}

/* CHAT HEADER */
.chdr{height:56px;background:var(--p1);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
/* Avatar en header — clicable para cambiar foto */
.chdr-av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;flex-shrink:0;overflow:hidden;background:linear-gradient(135deg,#0d2040,#1a3a60);color:#6ab0ff;cursor:pointer;position:relative;transition:all .2s}
.chdr-av:hover::after{content:'📷';position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:16px;border-radius:10px}
.chdr-av img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.chdr-info{flex:1;min-width:0}
.chdr-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;outline:none;letter-spacing:-.3px}
.chdr-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-top:2px;display:flex;align-items:center;gap:5px}
.online-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:all .3s}
.renbtn{background:var(--p3);border:1px solid var(--br);color:var(--t2);cursor:pointer;border-radius:7px;padding:5px 10px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s;white-space:nowrap;flex-shrink:0}
.renbtn:hover{border-color:var(--acc);color:var(--acc);background:var(--adim)}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:1px}
.dsep{text-align:center;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:3px;padding:12px 0;display:flex;align-items:center;gap:12px;text-transform:uppercase}
.dsep::before,.dsep::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--p4),transparent)}
.mrow{display:flex;align-items:flex-end;gap:6px;margin-bottom:2px}
.mrow.me{flex-direction:row-reverse}
.mbody{display:flex;flex-direction:column;max-width:72%}
.mrow.me .mbody{align-items:flex-end}
.bub{padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.bub.them{background:var(--p2);border:1px solid var(--p4);border-bottom-left-radius:3px}
.bub.me{background:linear-gradient(135deg,#ff6b00,#ff9500);color:#fff;border-bottom-right-radius:3px;font-weight:500;box-shadow:0 4px 16px rgba(255,107,0,.25)}
.mrow.cont .bub.them{border-top-left-radius:3px}
.mrow.cont .bub.me{border-top-right-radius:3px}
/* Imagen en burbuja */
.bub img{max-width:100%;max-height:280px;border-radius:8px;display:block;cursor:pointer}
.bub img:hover{opacity:.9}
.mtime{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);white-space:nowrap;margin-bottom:2px;flex-shrink:0}
.mst{font-size:11px;align-self:flex-end;margin-bottom:3px;flex-shrink:0}
.mst.ok{color:var(--acc)}.mst.wait{color:var(--t3)}.mst.fail{color:var(--red)}

/* INPUT BAR */
.ibar{padding:10px 14px;background:var(--p1);border-top:1px solid var(--br);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;position:relative}
.iwrap{flex:1;background:var(--p2);border:1px solid var(--br);border-radius:12px;display:flex;overflow:hidden;transition:all .2s}
.iwrap:focus-within{border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,107,0,.1)}
textarea{flex:1;background:transparent;border:none;padding:10px 12px;color:var(--txt);resize:none;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.45;min-height:40px;max-height:110px;overflow-y:auto}
textarea::placeholder{color:var(--t3)}
/* Botones barra de input */
.iaction{width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:all .2s;background:var(--p2);color:var(--t2)}
.iaction:hover{background:var(--adim);color:var(--acc)}
.sbtn{background:linear-gradient(135deg,#ff6b00,#ff9500);color:#fff;box-shadow:0 4px 14px rgba(255,107,0,.3)}
.sbtn:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,107,0,.45)}
.sbtn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}

/* EMOJI PICKER */
#epicker{position:absolute;bottom:62px;left:14px;background:var(--p1);border:1px solid var(--br2);border-radius:14px;padding:10px;box-shadow:var(--ng);z-index:50;display:none;width:300px;max-height:240px;overflow-y:auto}
#epicker.open{display:block}
.ecat{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;padding:4px 2px 6px;margin-top:4px}
.ecat:first-child{margin-top:0}
.egrid{display:flex;flex-wrap:wrap;gap:2px}
.em{font-size:22px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;transition:background .1s;user-select:none}
.em:hover{background:var(--p3)}

/* IMAGEN PREVIEW */
#imgPreview{display:none;position:absolute;bottom:62px;left:14px;right:14px;background:var(--p2);border:1px solid var(--br2);border-radius:12px;padding:10px;gap:10px;align-items:center;z-index:40}
#imgPreview.show{display:flex}
#imgPreview img{max-height:80px;border-radius:8px;object-fit:cover}
#imgPreview span{flex:1;font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#imgPreview button{background:var(--rdim);border:1px solid rgba(240,64,96,.2);color:var(--red);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px;flex-shrink:0}

/* LIGHTBOX */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;align-items:center;justify-content:center;cursor:zoom-out}
#lightbox.open{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:10px;box-shadow:0 0 60px rgba(0,0,0,.5)}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--p3);border:1px solid var(--br2);color:var(--txt);padding:9px 18px;border-radius:10px;font-size:12px;font-family:'JetBrains Mono',monospace;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:rgba(255,107,0,.15);border-color:var(--acc);color:#ff9500}
#toast.bad{background:var(--rdim);border-color:var(--red);color:var(--red)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--p1);border:1px solid var(--br2);border-radius:18px;padding:24px;width:305px;display:flex;flex-direction:column;gap:14px;box-shadow:var(--ng),0 32px 64px rgba(0,0,0,.5);position:relative;overflow:hidden}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,0,.5),transparent)}
.modal h2{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.3px}
.fi{background:var(--p2);border:1px solid var(--br);padding:10px 12px;border-radius:9px;color:var(--txt);outline:none;font-family:'DM Sans',sans-serif;font-size:13px;width:100%;transition:all .2s}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,107,0,.1)}
.fi::placeholder{color:var(--t3)}
.mbtn{padding:10px 16px;border-radius:9px;border:none;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff6b00,#ff9500);color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .2s;box-shadow:0 4px 14px rgba(255,107,0,.25)}
.mbtn:hover{opacity:.88;transform:translateY(-1px)}
.mbtn.gh{background:transparent;border:1px solid var(--br);color:var(--t2);box-shadow:none}
.mbtn.gh:hover{border-color:var(--t2);opacity:1;transform:none}
.merr{font-size:11px;color:var(--red);font-family:'JetBrains Mono',monospace;display:none;padding:7px 10px;background:var(--rdim);border-radius:7px;border:1px solid rgba(240,64,96,.2)}
/* Hidden file input */
#fileInput{display:none}
#avatarInput{display:none}
</style>
</head>
<body>

<div id="nolib">
  <div style="font-size:36px">📡</div>
  <div class="nt">No se pudo cargar PeerJS</div>
  <div class="nb">Comprueba tu conexión a internet.<br>O descarga <a href="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js" target="_blank">peerjs.min.js</a> junto al HTML.</div>
  <button onclick="location.reload()">↺ Reintentar</button>
</div>

<div id="splash">
  <div class="sp-logo">nova<span>chat</span></div>
  <div class="sp-sub">mensajería · p2p · directa</div>
  <div class="sp-card">
    <div class="sp-lbl">Tu código único</div>
    <div id="splashCode">····</div>
    <div class="sp-hint">Compártelo para recibir mensajes</div>
    <button id="enterBtn" disabled>Cargando…</button>
  </div>
</div>

<div id="app" style="display:none;flex-direction:column;height:100vh">
  <div id="bar">
    <div class="dot spin" id="dot"></div>
    <span id="stxt">conectando…</span>
    <div id="idbdg" class="bdg" onclick="copyCode()">ID <b id="myid">····</b></div>
    <div id="nickbdg" class="bdg" onclick="editNick()">✎ <span id="nickspan">Sin nombre</span></div>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="sbtop"><span class="sblbl">Chats</span><div class="addbtn" onclick="openModal()">＋</div></div>
      <div class="clist" id="clist"></div>
    </div>
    <div class="area" id="area">
      <div class="nosel"><div class="nosel-ico">💬</div><div class="nosel-txt">Selecciona un chat</div></div>
    </div>
  </div>
</div>

<!-- Lightbox para ver fotos a tamaño completo -->
<div id="lightbox" onclick="closeLightbox()"><img id="lbImg" src=""></div>

<!-- Input oculto para subir foto al chat -->
<input type="file" id="fileInput" accept="image/*" onchange="onFileSelected(event)">
<!-- Input oculto para cambiar avatar del contacto -->
<input type="file" id="avatarInput" accept="image/*" onchange="onAvatarSelected(event)">

<div id="toast"></div>

<!-- Modal nuevo chat (solo DM) -->
<div class="ov" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>Nuevo chat</h2>
    <input class="fi" id="dmname" placeholder="Apodo del contacto" autocomplete="off">
    <input class="fi" id="dmcode" placeholder="Código del contacto (4 dígitos)" maxlength="4" inputmode="numeric"
           onkeydown="if(event.key==='Enter')createChat()">
    <div class="merr" id="merr"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="mbtn gh" onclick="closeModal()">Cancelar</button>
      <button class="mbtn"    onclick="createChat()">Crear</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── PEERJS LOADER ──────────────────────────────
const CDNS = [
  'https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js',
  'https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js',
  'https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js'
];
let libOk = false;
(function tryLoad(i) {
  if (i >= CDNS.length) { document.getElementById('nolib').style.display='flex'; document.getElementById('splash').style.display='none'; return; }
  const s = document.createElement('script');
  s.src = CDNS[i];
  s.onload = () => { libOk=true; const b=document.getElementById('enterBtn'); b.disabled=false; b.textContent='ENTRAR →'; };
  s.onerror = () => tryLoad(i+1);
  document.head.appendChild(s);
})(0);

// ── ESTADO ─────────────────────────────────────
const myCode = (() => {
  let c = localStorage.getItem('nc_code');
  if (!c) { c=String(Math.floor(1000+Math.random()*9000)); localStorage.setItem('nc_code',c); }
  return c;
})();
document.getElementById('splashCode').textContent = myCode;
let myNick = localStorage.getItem('nc_nick') || '';

let peer   = null;
let chats  = {};   // id → { name, members[], messages[], avatar? }
let cur    = null;
let unread = {};
let _pendingAvatarId = null; // qué chat está esperando cambio de avatar
let _pendingImg      = null; // imagen pendiente de enviar

const CONNS   = {};
const QUEUE   = {};
const _pending = {};
const _bound   = new WeakSet();

// ── PERSISTENCIA ───────────────────────────────
function loadChats()  { try { chats=JSON.parse(localStorage.getItem('nc_chats')||'{}'); } catch { chats={}; } }
function saveChats()  { localStorage.setItem('nc_chats',JSON.stringify(chats)); }

// ── UTILS ──────────────────────────────────────
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hhmm(ts) { if(!ts) return ''; const d=new Date(ts); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function dayStr(ts) {
  if (!ts) return 'HOY';
  const d=new Date(ts),n=new Date();
  if (d.toDateString()===n.toDateString()) return 'HOY';
  const y=new Date(n); y.setDate(n.getDate()-1);
  if (d.toDateString()===y.toDateString()) return 'AYER';
  return d.toLocaleDateString('es',{day:'2-digit',month:'short'}).toUpperCase();
}

// ── CONEXIONES ─────────────────────────────────
function _attachConn(conn) {
  if (_bound.has(conn)) return;
  _bound.add(conn);
  conn.on('open',  () => { CONNS[conn.peer]=conn; _drainQueue(conn.peer.replace('nc_','')); });
  conn.on('data',  raw => { if (!raw||typeof raw!=='object') return; if (raw.type==='msg') _onMsg(raw); if (raw.type==='ack') _onAck(raw); if (raw.type==='img_chunk') _onImgChunk(raw); });
  conn.on('close', () => { if (CONNS[conn.peer]===conn) delete CONNS[conn.peer]; });
  conn.on('error', () => { if (CONNS[conn.peer]===conn) delete CONNS[conn.peer]; });
}

function _openConn(code) {
  if (!peer||peer.destroyed) return Promise.reject(new Error('no-peer'));
  const pid='nc_'+code;
  if (CONNS[pid]?.open) return Promise.resolve(CONNS[pid]);
  if (_pending[pid]) return _pending[pid];

  const p = new Promise((resolve,reject) => {
    const go = () => {
      const conn = peer.connect(pid,{reliable:true,serialization:'json'});
      _attachConn(conn);
      const timer = setTimeout(()=>{ delete _pending[pid]; reject(new Error('timeout')); },8000);
      conn.once('open', ()=>{ clearTimeout(timer); delete _pending[pid]; resolve(conn); });
      function onPE(err) {
        if (err.type==='peer-unavailable'&&err.message?.includes(code)) {
          clearTimeout(timer); peer.off('error',onPE); delete _pending[pid]; reject(new Error('offline'));
        }
      }
      peer.on('error',onPE);
      conn.once('open',  ()=>peer.off('error',onPE));
      conn.once('close', ()=>{ peer.off('error',onPE); delete _pending[pid]; });
      conn.once('error', ()=>{ peer.off('error',onPE); delete _pending[pid]; reject(new Error('err')); });
    };
    peer.open ? go() : peer.once('open', go);
  });
  _pending[pid]=p; return p;
}

async function _drainQueue(code) {
  const items=QUEUE[code]; if (!items?.length) return;
  const conn=CONNS['nc_'+code]; if (!conn?.open) return;
  const done=[];
  for (const item of items) {
    try {
      const p=item.payload;
      // Si tiene imagen, enviarla por chunks primero
      if (p.img && p.img!=='__chunked__') {
        await _sendImgChunked(conn,{chatId:p.chatId,sender:p.sender,ts:p.ts,img:p.img});
        p.img='__chunked__';
      }
      conn.send(p);
      const msg=chats[item.chatId]?.messages[item.msgIdx]; if(msg) msg.status='wait-ack';
      done.push(item);
    } catch {}
  }
  QUEUE[code]=items.filter(i=>!done.includes(i));
  if (done.length) { saveChats(); if(cur&&done.some(i=>i.chatId===cur)) renderMsgs(); }
}

// ── PEER INIT ──────────────────────────────────
function initPeer() {
  if (typeof Peer==='undefined') { setSt('err','PeerJS no cargó'); return; }
  setSt('spin','conectando…');
  peer = new Peer('nc_'+myCode, { config:{ iceServers:[
    {urls:'stun:stun.l.google.com:19302'},
    {urls:'stun:stun1.l.google.com:19302'},
    {urls:'stun:stun.cloudflare.com:3478'}
  ]}});
  peer.on('open', () => {
    setSt('on','en línea');
    Object.keys(QUEUE).forEach(code=>{ if(QUEUE[code]?.length) _openConn(code).then(()=>_drainQueue(code)).catch(()=>{}); });
  });
  peer.on('connection', conn=>_attachConn(conn));
  peer.on('disconnected', ()=>{ setSt('spin','reconectando…'); setTimeout(()=>{ if(peer&&!peer.destroyed) peer.reconnect(); },2000); });
  peer.on('error', err=>{ if(err.type==='peer-unavailable') return; if(err.type==='unavailable-id') {setSt('err','ID ocupado');return;} if(err.type==='network') {setSt('err','sin red');return;} });
  setInterval(()=>{ Object.keys(QUEUE).forEach(code=>{ if(QUEUE[code]?.length) _openConn(code).then(()=>_drainQueue(code)).catch(()=>{}); }); },20000);
}

// ── RECIBIR MENSAJE ────────────────────────────
function _onMsg({ chatId, sender, senderName, text, img, ts, members }) {
  if (!chats[chatId]) {
    const name = (senderName&&senderName!==sender) ? senderName : sender;
    chats[chatId] = { name, members: members?.length ? members : [myCode,sender], messages:[] };
    toast('💬 '+name,'ok');
  }
  // img='pending' significa que los chunks vienen justo después
  const imgVal = (!img || img==='pending' || img==='__chunked__') ? null : img;
  const msgTs = ts||Date.now();
  chats[chatId].messages.push({ sender, senderName:senderName||sender, text:text||'', img:imgVal, ts:msgTs, status:'ok' });
  // Comprobar si los chunks ya llegaron antes que el mensaje (race condition)
  const key = msgTs+'_'+sender;
  if (_imgBufs[key] && _imgBufs[key].received === _imgBufs[key].total) {
    const fullImg = _imgBufs[key].chunks.join('');
    delete _imgBufs[key];
    chats[chatId].messages[chats[chatId].messages.length-1].img = fullImg;
  }
  saveChats();
  if (cur===chatId) renderMsgs();
  else { unread[chatId]=true; document.title='💬 Nuevo mensaje — NovaChat'; setTimeout(()=>document.title='NovaChat',3000); }
  renderList();
  // ACK
  try { const c=CONNS['nc_'+sender]; if(c?.open) c.send({type:'ack',chatId,ts,receiver:myCode}); } catch {}
}

function _onAck({ chatId, ts }) {
  const chat=chats[chatId]; if (!chat) return;
  const msg=[...chat.messages].reverse().find(m=>m.sender===myCode&&m.ts===ts);
  if (msg&&msg.status!=='ok') { msg.status='ok'; saveChats(); if(cur===chatId) renderMsgs(); }
}

// ── ENVÍO DE IMÁGENES POR CHUNKS ──────────────
// WebRTC DataChannel tiene límite ~16KB por mensaje.
// Dividimos la imagen en trozos de 12KB y los reensamblamos en el receptor.
const CHUNK_SIZE = 12000;
const _imgBufs = {};

async function _sendImgChunked(conn, { chatId, sender, ts, img }) {
  const total = Math.ceil(img.length / CHUNK_SIZE);
  for (let i=0; i<total; i++) {
    const chunk = img.slice(i*CHUNK_SIZE, (i+1)*CHUNK_SIZE);
    conn.send({ type:'img_chunk', chatId, sender, ts, chunk, idx:i, total });
    if (i % 5 === 4) await new Promise(r=>setTimeout(r,30));
  }
}

function _onImgChunk({ chatId, sender, ts, chunk, idx, total }) {
  const key = ts+'_'+sender;
  if (!_imgBufs[key]) _imgBufs[key] = { chunks:new Array(total), received:0, chatId, sender, ts, total };
  const buf = _imgBufs[key];
  if (!buf.chunks[idx]) { buf.chunks[idx]=chunk; buf.received++; }
  if (buf.received === total) {
    const fullImg = buf.chunks.join('');
    const chat = chats[chatId];
    const msg = chat?.messages.find(m => m.ts===ts && m.sender===sender);
    if (msg) {
      // Mensaje ya existe — poner imagen directamente
      delete _imgBufs[key];
      msg.img = fullImg;
      saveChats();
      if (cur===chatId) renderMsgs();
    }
    // Si el msg no existe todavía, mantener _imgBufs[key] para que _onMsg lo recoja
  }
}

// ── ENVIAR MENSAJE ─────────────────────────────
async function sendMsg() {
  const ta=document.getElementById('ta'), sbtn=document.getElementById('sbtn');
  if (!ta||!cur) return;
  const text=ta.value.trim();
  const img=_pendingImg||null;
  if (!text&&!img) return;

  const snap=cur, chat=chats[snap]; if (!chat) return;
  const ts=Date.now(), msgIdx=chat.messages.length;

  chat.messages.push({ sender:myCode, senderName:myNick||myCode, text, img, ts, status:'wait' });
  saveChats();
  ta.value=''; ta.style.height='auto';
  _pendingImg=null;
  hidePrevImg();
  sbtn.disabled=true; sbtn.textContent='···';
  renderMsgs(); renderList();

  // Primero enviamos el mensaje de texto (con img:'pending' si hay foto)
  // Luego enviamos los chunks de imagen por separado
  // Así el receptor crea la entrada del mensaje primero y después recibe la foto
  const hasImg = !!img;
  const payload = {
    type:'msg', chatId:snap, sender:myCode, senderName:myNick||myCode,
    text, img: hasImg ? 'pending' : null, ts, members:chat.members
  };
  const targets = chat.members.filter(m=>m!==myCode);
  let sentAny=false;

  for (const code of targets) {
    try {
      const conn = await _openConn(code);
      // 1. Enviar mensaje de texto primero
      conn.send(payload);
      sentAny = true;
      if (chat.messages[msgIdx]) chat.messages[msgIdx].status = 'wait-ack';
      // 2. Enviar imagen en chunks después (pequeño delay para que llegue el msg antes)
      if (hasImg) {
        setTimeout(async () => {
          try { await _sendImgChunked(conn, { chatId:snap, sender:myCode, ts, img }); }
          catch(e) { console.warn('chunk send failed', e); }
        }, 100);
      }
    } catch {
      const qPayload = { type:'msg', chatId:snap, sender:myCode, senderName:myNick||myCode, text, img, ts, members:chat.members };
      if (!QUEUE[code]) QUEUE[code]=[];
      if (!QUEUE[code].some(e=>e.payload.ts===ts&&e.chatId===snap)) QUEUE[code].push({chatId:snap,payload:qPayload,msgIdx});
    }
  }
  if (!sentAny&&targets.length>0) { if(chat.messages[msgIdx]) chat.messages[msgIdx].status='wait'; toast('⏳ Sin conexión — se enviará al reconectar'); }
  saveChats(); renderMsgs();
  sbtn.disabled=false; sbtn.textContent='➔';
}

function onFileSelected(e) {
  const file=e.target.files[0]; if(!file) return;
  if (file.size > 10*1024*1024) { toast('Máximo 10 MB por imagen','bad'); e.target.value=''; return; }
  const reader=new FileReader();
  reader.onload=ev=>{
    // Comprimir con canvas: máx 900px, calidad 0.65
    const img=new Image();
    img.onload=()=>{
      const MAX=900, canvas=document.createElement('canvas');
      let w=img.width, h=img.height;
      if (w>MAX||h>MAX) { if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL('image/jpeg',0.65);
      _pendingImg=compressed;
      showPrevImg(file.name, compressed);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function openChat(id) {
  cur=id; delete unread[id];
  if (window._poll) clearInterval(window._poll);
  renderList();
  const c=chats[id];
  const otherCode=c.members.find(m=>m!==myCode)||'';
  const avHTML=c.avatar?`<img src="${c.avatar}">`:(c.name||'?')[0].toUpperCase();

  document.getElementById('area').innerHTML=`
    <div class="chdr">
      <div class="chdr-av" id="chdr-av" onclick="changeAvatar('${id}')" title="Cambiar foto de contacto">${avHTML}</div>
      <div class="chdr-info">
        <div class="chdr-name" id="cname">${esc(c.name)}</div>
        <div class="chdr-sub" id="csub"><span class="online-dot" id="odot"></span><span>${esc(otherCode)}</span></div>
      </div>
      <button class="renbtn" onclick="headerRename('${id}')">✎ Renombrar</button>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="ibar">
      <div id="imgPreview"></div>
      <div id="epicker"></div>
      <button class="iaction" onclick="toggleEmoji()" title="Emojis">😊</button>
      <button class="iaction" onclick="pickPhoto()" title="Enviar foto">📷</button>
      <div class="iwrap"><textarea id="ta" placeholder="Escribe un mensaje…" rows="1"></textarea></div>
      <button class="sbtn iaction" id="sbtn" onclick="sendMsg()">➔</button>
    </div>`;

  const ta=document.getElementById('ta');
  ta.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} });
  ta.addEventListener('input',  ()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,110)+'px'; });
  renderMsgs(); ta.focus();

  // Indicador online
  const upDot=()=>{
    const dot=document.getElementById('odot'); if(!dot) return;
    const on=CONNS['nc_'+otherCode]?.open;
    dot.style.background=on?'var(--acc)':'var(--t3)';
    dot.style.boxShadow=on?'0 0 6px var(--acc)':'';
  };
  upDot();
  window._poll=setInterval(()=>{ if(cur!==id){clearInterval(window._poll);return;} upDot(); },2000);
}

// ── RENDER MENSAJES ────────────────────────────
function renderMsgs() {
  const el=document.getElementById('msgs'); if(!el||!cur||!chats[cur]) return;
  const msgs=chats[cur].messages;
  if (!msgs.length) { el.innerHTML=`<div style="text-align:center;padding:40px 0;font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;letter-spacing:2px">SIN MENSAJES TODAVÍA 👋</div>`; return; }
  const ST={ok:'✓','wait-ack':'✓',wait:'⏳',fail:'✕'};
  const SC={ok:'ok','wait-ack':'ok',wait:'wait',fail:'fail'};
  let html='', lastDay='', lastSender='';
  for (const m of msgs) {
    const me=m.sender===myCode, day=dayStr(m.ts);
    if (day!==lastDay) { html+=`<div class="dsep">${day}</div>`; lastDay=day; lastSender=''; }
    const cont=lastSender===m.sender;
    const st=me?`<span class="mst ${SC[m.status]||'ok'}">${ST[m.status]||'✓'}</span>`:'';
    // Contenido: texto y/o imagen
    let content='';
    if (m.img) content+=`<img src="${m.img}" onclick="openLightbox('${m.img.replace(/'/g,'\\\'')}')" title="Ver imagen completa">`;
    if (m.text) content+=`<span>${esc(m.text)}</span>`;
    html+=`<div class="mrow${me?' me':''}${cont?' cont':''}">
      ${me?st:''}
      <div class="mbody"><div class="bub ${me?'me':'them'}">${content}</div></div>
      <span class="mtime">${hhmm(m.ts)}</span>
      ${!me?st:''}
    </div>`;
    lastSender=m.sender;
  }
  el.innerHTML=html;
  requestAnimationFrame(()=>{ el.scrollTop=el.scrollHeight; });
}

// ── RENOMBRAR ──────────────────────────────────
function _editable(el,id,cb) {
  const old=chats[id]?.name||'';
  el.contentEditable='true'; el.style.outline='none'; el.style.borderBottom='1px solid var(--acc)'; el.focus();
  try { const r=document.createRange(); r.selectNodeContents(el); window.getSelection().removeAllRanges(); window.getSelection().addRange(r); } catch{}
  const done=()=>{ el.contentEditable='false'; el.style.borderBottom=''; const n=el.textContent.trim(); if(n&&n!==old){chats[id].name=n;saveChats();cb(n);}else el.textContent=old; };
  el.onblur=done;
  el.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();el.blur();} if(e.key==='Escape'){el.textContent=old;el.blur();} };
}
function headerRename(id) { const el=document.getElementById('cname'); if(!el) return; _editable(el,id,()=>{renderList();toast('Nombre actualizado ✓','ok');}); }
function sidebarRename(e,id) { e.stopPropagation(); _editable(e.target,id,n=>{if(cur===id){const h=document.getElementById('cname');if(h)h.textContent=n;}renderList();toast('Nombre actualizado ✓','ok');}); }

// ── ELIMINAR ───────────────────────────────────
function delChat(e,id) {
  e.stopPropagation(); if(!confirm('¿Eliminar este chat?')) return;
  delete chats[id]; delete unread[id];
  if (cur===id) { cur=null; if(window._poll)clearInterval(window._poll); document.getElementById('area').innerHTML=`<div class="nosel"><div class="nosel-ico">💬</div><div class="nosel-txt">Selecciona un chat</div></div>`; }
  saveChats(); renderList(); toast('Chat eliminado');
}

// ── MODAL ──────────────────────────────────────
function openModal() {
  document.getElementById('dmname').value=''; document.getElementById('dmcode').value='';
  document.getElementById('merr').style.display='none';
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('dmname').focus(),40);
}
function closeModal() { document.getElementById('modal').style.display='none'; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeModal();document.getElementById('epicker')?.classList.remove('open');} });

function showErr(msg) { const e=document.getElementById('merr'); e.textContent=msg; e.style.display='block'; }
function createChat() {
  document.getElementById('merr').style.display='none';
  const code=document.getElementById('dmcode').value.trim();
  const name=document.getElementById('dmname').value.trim();
  if (!name)                  return showErr('El apodo no puede estar vacío.');
  if (!/^\d{4}$/.test(code))  return showErr('El código debe ser 4 dígitos.');
  if (code===myCode)           return showErr('No puedes chatear contigo mismo.');
  if (Object.values(chats).some(c=>c.members?.includes(code)&&c.members?.includes(myCode))) return showErr('Ya tienes un chat con ese contacto.');
  const id='dm_'+Date.now();
  chats[id]={name,members:[myCode,code],messages:[]};
  saveChats(); renderList(); closeModal(); openChat(id); toast('Chat creado ✓','ok');
}

// ── NICKNAME ───────────────────────────────────
function editNick() {
  const badge=document.getElementById('nickbdg'), old=myNick;
  badge.innerHTML='✎ <input id="nki" maxlength="20" autocomplete="off" placeholder="Tu nombre" style="background:transparent;border:none;border-bottom:1px solid var(--acc);color:var(--txt);outline:none;font-family:inherit;font-size:11px;width:90px;padding:0 2px">';
  const inp=document.getElementById('nki');
  inp.value=old;
  inp.addEventListener('blur',   ()=>saveNick(inp.value));
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();inp.blur();} if(e.key==='Escape'){inp.value=old;inp.blur();} });
  setTimeout(()=>{inp.focus();inp.select();},20);
}
function saveNick(val) {
  myNick=val.trim(); localStorage.setItem('nc_nick',myNick);
  const b=document.getElementById('nickbdg');
  if(b) b.innerHTML='✎ <span id="nickspan">'+esc(myNick||'Sin nombre')+'</span>';
  if(myNick) toast('Nombre: '+myNick,'ok');
}

// ── COPIAR CÓDIGO ──────────────────────────────
function copyCode() {
  navigator.clipboard.writeText(myCode).then(()=>toast('Código copiado: '+myCode,'ok')).catch(()=>toast('No se pudo copiar','bad'));
}

// ── ARRANCAR ───────────────────────────────────
document.getElementById('enterBtn').onclick=()=>{
  if (!libOk) { toast('PeerJS todavía cargando…'); return; }
  document.getElementById('splash').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('myid').textContent=myCode;
  document.getElementById('nickspan').textContent=myNick||'Sin nombre';
  loadChats(); renderList(); initPeer();
};
</script>
