<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaChat - 3 Digits</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --p-color: #00ff88; --s-color: #00bcff; --bg: #0a0a0c; --panel: #16161a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--panel); padding: 15px; text-align: center; border-bottom: 2px solid var(--p-color); }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--p-color); letter-spacing: 2px; }
        #setup-area { padding: 15px; background: #111; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #333; align-items: center; }
        .id-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        #mi-id { font-size: 2rem; font-weight: bold; color: var(--p-color); letter-spacing: 5px; margin: 5px 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 80%; animation: fadeIn 0.3s ease; }
        .received { background: var(--panel); align-self: flex-start; border-left: 4px solid var(--s-color); }
        .sent { background: var(--p-color); color: black; align-self: flex-end; font-weight: 500; }
        .system { background: rgba(255,255,255,0.05); align-self: center; font-size: 0.7rem; color: #666; }
        .controls { padding: 15px; background: var(--panel); display: flex; gap: 10px; }
        input { flex: 1; background: #222; border: 1px solid #444; padding: 12px; border-radius: 10px; color: white; outline: none; }
        button { background: var(--p-color); color: black; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header><div class="logo-text">NOVACHAT</div></header>

    <div id="setup-area">
        <div class="id-label">Tu código de entrada:</div>
        <div id="mi-id">...</div>
        
        <div style="display: flex; gap: 5px; width: 100%; max-width: 300px;">
            <input type="number" id="id-destino" placeholder="Código del amigo" pattern="\d*">
            <button onclick="conectarAAmigo()" style="background: var(--s-color);">UNIRSE</button>
        </div>
    </div>

    <div id="chat">
        <div class="bubble system">Introduce el código de 3 cifras de tu amigo para empezar.</div>
    </div>

    <div class="controls">
        <input type="text" id="mensaje" placeholder="Escribe un mensaje..." autocomplete="off">
        <button onclick="enviarMensaje()">ENVIAR</button>
    </div>

    <script>
        // Generar un número aleatorio de 3 cifras (100 a 999)
        const idAleatorio = Math.floor(100 + Math.random() * 900).toString();
        
        // Iniciamos Peer con ese número específico
        const peer = new Peer(idAleatorio);
        let conn;

        peer.on('open', (id) => {
            document.getElementById('mi-id').innerText = id;
        });

        // Error si el número ya está pillado
        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                alert("Este código ya está en uso. Recarga para generar otro.");
            }
        });

        peer.on('connection', (c) => {
            conn = c;
            prepararChat();
        });

        function conectarAAmigo() {
            const idDestino = document.getElementById('id-destino').value;
            if(idDestino.length !== 3) return alert("El código debe ser de 3 números");
            conn = peer.connect(idDestino);
            prepararChat();
        }

        function prepararChat() {
            conn.on('data', (data) => mostrarMensaje("Amigo", data, 'received'));
            conn.on('open', () => mostrarMensaje("Sistema", "¡Conexión establecida!", 'system'));
        }

        function enviarMensaje() {
            const input = document.getElementById('mensaje');
            if (conn && conn.open && input.value.trim() !== "") {
                conn.send(input.value);
                mostrarMensaje("Tú", input.value, 'sent');
                input.value = "";
            }
        }

        function mostrarMensaje(autor, texto, tipo) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `bubble ${tipo}`;
            div.innerHTML = tipo === 'system' ? texto : `<b>${autor}:</b> ${texto}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        document.getElementById('mensaje').addEventListener("keyup", (e) => {
            if(e.key === "Enter") enviarMensaje();
        });
    </script>
</body>
</html>
